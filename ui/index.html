    //      (a) folder name under test-cases/<menu>/ (legacy: login/member/etc.)
    //      (b) flat xlsx file under test-cases/backoffice/NN-<slug>.xlsx (R2/R3 layout)
    //          → module = NN-<slug> derived from filename (08-token-packages, 09-welcome-bonus, ...)
    const MODULE_META = {
      'context-switcher':           {icon: '🔀', label: 'Context Switcher',    color: '#7c3aed', bg: '#f3e8ff'},
      'login':                      {icon: '🔐', label: 'Login / Logout',      color: '#0369a1', bg: '#e0f2fe'},
      'member':                     {icon: '👥', label: 'Members',             color: '#be185d', bg: '#fce7f3'},
      'permission':                 {icon: '🛡️', label: 'Permission',          color: '#b45309', bg: '#fef3c7'},
      // R2 (Avatar Admin)
      '01-dashboard':               {icon: '📊', label: 'Avatar Admin — Dashboard',         color: '#0891b2', bg: '#cffafe'},
      '02-hardware-inventory':      {icon: '🖥', label: 'Avatar Admin — Hardware Inventory', color: '#0891b2', bg: '#cffafe'},
      '03-device-operations':       {icon: '⚙️', label: 'Avatar Admin — Device Operations', color: '#0891b2', bg: '#cffafe'},
      '05-assign-avatar':           {icon: '🎭', label: 'Avatar Admin — Assign Avatar',    color: '#0891b2', bg: '#cffafe'},
      '06-tenants':                 {icon: '🏢', label: 'Avatar Admin — Tenants',          color: '#0891b2', bg: '#cffafe'},
      '07-token-settings':          {icon: '🎫', label: 'Avatar Admin — Token Settings',   color: '#0891b2', bg: '#cffafe'},
      '08-token-packages':          {icon: '📦', label: 'Token Packages',                  color: '#9333ea', bg: '#f3e8ff'},
      '09-welcome-bonus':           {icon: '🎁', label: 'Welcome Bonus',                   color: '#9333ea', bg: '#f3e8ff'},
      // R3 (Analytics & Reporting)
      '10-central-dashboard':       {icon: '🏠', label: 'Central Dashboard',     color: '#4338ca', bg: '#e0e7ff'},
      '11-health-dashboard':        {icon: '💚', label: 'Health Dashboard',      color: '#4338ca', bg: '#e0e7ff'},
      '12-revenue-analytics':       {icon: '💰', label: 'Revenue Analytics',     color: '#4338ca', bg: '#e0e7ff'},
      '13-usage-analytics':         {icon: '📈', label: 'Usage Analytics',       color: '#4338ca', bg: '#e0e7ff'},
      '14-customer-analytics':      {icon: '👤', label: 'Customer Analytics',    color: '#4338ca', bg: '#e0e7ff'},
      '15-session-monitoring':      {icon: '🎬', label: 'Session Monitoring',    color: '#4338ca', bg: '#e0e7ff'},
      '16-device-analytics':        {icon: '📱', label: 'Device Analytics',      color: '#4338ca', bg: '#e0e7ff'},
      '17-token-economy-report':    {icon: '💎', label: 'Token Economy Report',  color: '#4338ca', bg: '#e0e7ff'},
      '18-tenant-data-export':      {icon: '📤', label: 'Tenant Data Export',    color: '#4338ca', bg: '#e0e7ff'},
      '20-badge-counters':          {icon: '🏷', label: 'Badge Counters',         color: '#4338ca', bg: '#e0e7ff'},
      '21-module-registry-sidebar': {icon: '📑', label: 'Module Registry',       color: '#4338ca', bg: '#e0e7ff'},
      '22-login':                   {icon: '🔐', label: 'Login / Logout',        color: '#0369a1', bg: '#e0f2fe'},
      '23-context-switcher':        {icon: '🔀', label: 'Context Switcher',      color: '#7c3aed', bg: '#f3e8ff'},
      '24-members':                 {icon: '👥', label: 'Members',               color: '#be185d', bg: '#fce7f3'},
      '25-permission':              {icon: '🛡️', label: 'Permission',            color: '#b45309', bg: '#fef3c7'},
      'other':                      {icon: '📄', label: 'Other',                 color: '#374151', bg: '#f3f4f6'},
    };
    const moduleOf = (caseId) => {
      const firstRow = byId[caseId][0];
      const sf = firstRow.source_file || '';
      // 1) Try filename-based module key (R2/R3 layout): test-cases/.../NN-<slug>.xlsx
      const fnMatch = sf.match(/\/(\d{2}-[a-z0-9-]+)\.xlsx$/i);
      if (fnMatch && MODULE_META[fnMatch[1]]) return fnMatch[1];
      // 2) Fallback: legacy folder-based (test-cases/<menu>/<category>/file.xlsx)
      const folderMatch = sf.match(/test-cases\/([^/]+)\//);
      if (folderMatch && MODULE_META[folderMatch[1]]) return folderMatch[1];
      return 'other';
    };
    // Stable ordering: เรียงตาม MODULE_META key order แล้ว case_id ภายใน module
    const moduleOrder = Object.keys(MODULE_META);
    const groupedCases = {};
    caseIds.forEach(id => {
      const mod = moduleOf(id);
      (groupedCases[mod] = groupedCases[mod] || []).push(id);
    });
    moduleOrder.forEach(mod => {
      if (groupedCases[mod]) groupedCases[mod].sort();
    });

    // ── Sub-scenario grouping within a module
    // case_id pattern: BO-{MENU}-{SUB?}-{NN} เช่น BO-MBR-HIS-001 → sub="HIS", BO-MBR-001 → sub="" (main)
    // BO-MBR-HIS-PRM-017 → sub="HIS" (PRM ถือเป็น variant ของ sub เดียวกัน)
    const SUB_META = {
      '':    {label: 'Main',           icon: '📋'},
      'LO':  {label: 'Logout',         icon: '⎋'},
      'ACI': {label: 'Accept Invite',  icon: '📨'},
      'CRL': {label: 'Custom Roles',   icon: '🛡'},
      'HIS': {label: 'History',        icon: '📜'},
      'INV': {label: 'Invite Modal',   icon: '➕'},
      'PRM': {label: 'Permissions',    icon: '🔐'},
      'SP':  {label: 'Sub-Platform',   icon: '🏢'},
      'E':   {label: 'E2E',            icon: '🔁'},  // BO-XXX-E2E-*
    };
    const subOf = (caseId) => {
      // strip "BO-XYZ-" prefix → "<sub?>-<NN>" หรือ "<NN>"
      const parts = caseId.split('-').slice(2);  // remove BO + menu code
      if (!parts.length) return '';
      const first = parts[0];
      // ถ้า first เป็นตัวเลขล้วน = main scenario (no sub)
      if (/^\d+$/.test(first)) return '';
      // ถ้าเป็น "PRM" ที่ตามด้วยตัวเลข = main permissions
      // ถ้ามี sub อยู่แล้วตามด้วย PRM (เช่น HIS-PRM) → sub = HIS (รวมเข้าด้วยกัน)
      return first;
    };
    // Group cases by (module, sub) → groupedSub[mod][sub] = [caseIds]
    const groupedSub = {};
    moduleOrder.forEach(mod => {
      const ids = groupedCases[mod] || [];
      groupedSub[mod] = {};
      ids.forEach(id => {
        const sub = subOf(id);
        (groupedSub[mod][sub] = groupedSub[mod][sub] || []).push(id);
      });
    });
    // Sub ordering: '' (main) first, then alphabetical
    const subOrderFor = (mod) => {
      const keys = Object.keys(groupedSub[mod] || {});
      return keys.sort((a, b) => {
        if (a === '') return -1;
        if (b === '') return 1;
        return a.localeCompare(b);
      });
    };

    // Read saved statuses from collection (per case_id)
    const col = (STATE.selectedCollection && STATE.selectedCollection.collection) || {};
    const collectionId = col.id || '';
    const savedStatuses = col.case_statuses || {};
    const savedRemarks = col.case_remarks || {};

    // Build run-result overlay: map test_id → latest Playwright run status + raw error/reason.
    // Priority: 1) admin saved status (case_statuses) → 2) latest run result → 3) PENDING.
    // This way the table reflects automated runs but admin can still override.
    const runStatusMap = {};
    const runReasonMap = {};  // test_id → raw error/reason string
    (runResults || []).forEach(r => {
      const tid = (r.test_id || '').trim();
      if (!tid) return;
      const s = (r.status || '').toUpperCase();
      if (s === 'PASS') runStatusMap[tid] = 'PASS';
      else if (s === 'FAIL') runStatusMap[tid] = 'FAIL';
      else if (s === 'PENDING' || s === 'SKIP') runStatusMap[tid] = (runStatusMap[tid] || 'PENDING');
      runReasonMap[tid] = r.error || r.reason || '';
    });
    const getStatus = (id) => savedStatuses[id] || runStatusMap[id] || 'PENDING';
    // Remark priority: 1) admin saved → 2) auto-humanized FAIL reason from run → 3) ''
    const getRemark = (id) => {
      if (savedRemarks[id]) return savedRemarks[id];
      if (getStatus(id) === 'FAIL' && runReasonMap[id]) {
        return '🤖 ' + humanizeFailReason(runReasonMap[id]);
      }
      return '';
    };

    // Count by status — per case (not per step)
    const counts = {PENDING:0, PASS:0, FAIL:0, SKIP:0, REOPEN:0};
    caseIds.forEach(id => { counts[getStatus(id)] = (counts[getStatus(id)] || 0) + 1; });

    let html = `<div style="background:#eef2ff;padding:10px 14px;border-radius:8px;margin-bottom:12px;font-size:12px;color:#4338ca;display:flex;flex-wrap:wrap;gap:12px;align-items:center">
      <div>📋 <b>${caseIds.length}</b> cases / <b>${rows.length}</b> steps (จาก ${Object.keys(rows.reduce((a,r)=>(a[r.source_file]=1,a),{})).length} ไฟล์)</div>
      <div style="margin-left:auto;display:flex;gap:8px;font-size:11px">
        ${BO_STATUS_LIST.map(s => {
          const sty = BO_STATUS_STYLE[s];
          return `<span style="background:${sty.bg};color:${sty.color};padding:2px 8px;border-radius:10px;font-weight:600">${sty.icon} ${s}: ${counts[s]||0}</span>`;
        }).join('')}
      </div>
    </div>`;
    html += `<table>
      <thead><tr>
        <th style="width:80px">Type</th>
        <th style="min-width:140px">TC ID</th>
        <th style="min-width:180px">ชื่อ Test Case</th>
        <th style="min-width:160px">Pre-condition</th>
        <th style="width:50px">Step #</th>
        <th style="min-width:240px">Step</th>
        <th style="min-width:240px">Expect Result</th>
        <th style="min-width:130px">Status</th>
        <th style="min-width:200px">Remark</th>
      </tr></thead><tbody>`;

    // Loop ตาม module → แทรก section header แต่ละครั้งที่เปลี่ยน module
    const COLSPAN = 9; // Type + TC ID + ชื่อ Test Case + Pre-condition + Step # + Step + Expect Result + Status + Remark
    moduleOrder.forEach(mod => {
      const ids = groupedCases[mod];
      if (!ids || !ids.length) return;
      const meta = MODULE_META[mod];
      // Section header row — count per case
      const modCounts = {PENDING:0, PASS:0, FAIL:0, SKIP:0, REOPEN:0};
      ids.forEach(id => { modCounts[getStatus(id)] = (modCounts[getStatus(id)] || 0) + 1; });
      const pillsHtml = BO_STATUS_LIST.map(s => {
        const cnt = modCounts[s] || 0;
        if (cnt === 0) return '';
        const ssty = BO_STATUS_STYLE[s];
        return `<span style="background:${ssty.bg};color:${ssty.color};padding:1px 7px;border-radius:8px;font-size:10px;font-weight:600">${ssty.icon} ${cnt}</span>`;
      }).filter(Boolean).join(' ');
      html += `<tr><td colspan="${COLSPAN}" style="background:${meta.bg};border-top:3px solid ${meta.color};border-bottom:1px solid ${meta.color};padding:10px 14px">
        <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
          <span style="font-size:14px;font-weight:700;color:${meta.color}">${meta.icon} ${esc(meta.label)}</span>
          <span style="font-size:11px;color:#6b7280;font-weight:500">${ids.length} ${ids.length > 1 ? 'cases' : 'case'}</span>
          <span style="margin-left:auto;display:flex;gap:4px;flex-wrap:wrap">${pillsHtml}</span>
        </div>
      </td></tr>`;

      // Render cases grouped by sub-scenario within this module
      const subKeys = subOrderFor(mod);
      subKeys.forEach(subKey => {
        const subIds = groupedSub[mod][subKey] || [];
        if (!subIds.length) return;
        const subMeta = SUB_META[subKey] || {label: subKey || 'Other', icon: '📋'};
        // Sub-scenario header — small, lighter than module header
        const subModCounts = {PENDING:0, PASS:0, FAIL:0, SKIP:0, REOPEN:0};
        subIds.forEach(id => { subModCounts[getStatus(id)] = (subModCounts[getStatus(id)] || 0) + 1; });
        const subPills = BO_STATUS_LIST.map(s => {
          const cnt = subModCounts[s] || 0;
          if (cnt === 0) return '';
          const ssty = BO_STATUS_STYLE[s];
          return `<span style="background:${ssty.bg};color:${ssty.color};padding:1px 6px;border-radius:7px;font-size:10px;font-weight:600">${ssty.icon} ${cnt}</span>`;
        }).filter(Boolean).join(' ');
        html += `<tr><td colspan="${COLSPAN}" style="background:#f9fafb;border-top:1px solid #e5e7eb;border-bottom:1px solid #e5e7eb;padding:6px 14px 6px 28px">
          <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
            <span style="font-size:12px;font-weight:600;color:#374151">${subMeta.icon} ${esc(subMeta.label)}</span>
            <span style="font-size:10px;color:#9ca3af">${subIds.length} ${subIds.length > 1 ? 'cases' : 'case'} (${esc(subIds[0])} – ${esc(subIds[subIds.length-1])})</span>
            <span style="margin-left:auto;display:flex;gap:3px;flex-wrap:wrap">${subPills}</span>
          </div>
        </td></tr>`;

      subIds.forEach(caseId => {
      const caseRows = byId[caseId];
      const status = getStatus(caseId);
      const sty = BO_STATUS_STYLE[status] || BO_STATUS_STYLE.PENDING;
      // Type (Script/Manual) — derived from xlsx Automation column, same for all step rows
      const caseType = (caseRows[0] && caseRows[0].type) || '';
      const typeChip = caseType === 'Script'
        ? '<span style="background:#dbeafe;color:#1d4ed8;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700;min-width:65px;display:block">🤖 Script</span>'
        : caseType === 'Manual'
        ? '<span style="background:#fef3c7;color:#92400e;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700;min-width:65px;display:block">🧑 Manual</span>'
        : '<span style="color:#9ca3af;font-size:11px;min-width:65px;display:block">—</span>';
      caseRows.forEach((r, idx) => {
        const isFirst = idx === 0;
        const stepCount = caseRows.length;
        // Light markdown: **bold** + `code` + newlines → <br>
        const renderMd = (text) => esc(text || '')
          .replace(/\*\*([^*\n]+?)\*\*/g, '<strong>$1</strong>')
          .replace(/`([^`\n]+?)`/g, '<code style="background:#f3f4f6;padding:1px 4px;border-radius:3px;font-size:11px">$1</code>')
          .replace(/\n/g, '<br>');
        const scenario = isFirst ? renderMd(r.scenario) : '';
        const precond = isFirst ? renderMd(r.pre_conditions) : '';
        const step = esc(r.step || '');
        const testStep = renderMd(r.test_step);
        const expected = renderMd(r.expected_result);

        // Status dropdown + Remark textarea — แสดงแค่แถวแรกของ case, แถวอื่นเว้นว่าง (1 case = 1 status)
        let statusCell = '';
        let remarkCell = '';
        if (isFirst) {
          const opts = BO_STATUS_LIST.map(s => {
            const ssty = BO_STATUS_STYLE[s];
            const selAttr = s === status ? 'selected' : '';
            return `<option value="${s}" ${selAttr}>${ssty.icon} ${s}</option>`;
          }).join('');
          statusCell = `<td data-bo-status-cell="${esc(caseId)}" style="background:${sty.bg};text-align:center;vertical-align:top" rowspan="${stepCount}">
            <select onchange="updateBackofficeCaseStatus('${esc(collectionId)}','${esc(caseId)}',this.value)"
              style="width:100%;padding:4px 6px;border:1px solid #d1d5db;border-radius:4px;font-size:12px;background:#fff;color:${sty.color};font-weight:700">
              ${opts}
            </select>
          </td>`;
          const remarkText = getRemark(caseId);
          remarkCell = `<td style="vertical-align:top" rowspan="${stepCount}">
            <textarea
              onblur="updateBackofficeCaseRemark('${esc(collectionId)}','${esc(caseId)}',this.value)"
              placeholder="หมายเหตุ / สาเหตุ / link bug"
              style="width:100%;min-height:54px;padding:6px 8px;border:1px solid #d1d5db;border-radius:4px;font-size:11px;font-family:inherit;resize:vertical;box-sizing:border-box">${esc(remarkText)}</textarea>
          </td>`;
        }

        html += `<tr style="${isFirst ? 'border-top:2px solid #d1d5db' : ''}">`;
        if (isFirst) {
          // Column order: Type | TC ID | ชื่อ Test Case | Pre-condition
          html += `<td style="text-align:center;vertical-align:top" rowspan="${stepCount}">${typeChip}</td>
            <td style="vertical-align:top"><strong>${esc(caseId)}</strong><div style="font-size:10px;color:#9ca3af;margin-top:2px">${stepCount} ${stepCount > 1 ? 'steps' : 'step'}</div></td>
            <td style="vertical-align:top">${scenario}</td>
            <td style="vertical-align:top;font-size:11px;color:#4b5563">${precond}</td>`;
        } else {
          // Type uses rowspan from first row. TC ID + ชื่อ Test Case + Pre-condition are empty here.
          html += `<td></td><td></td><td></td>`;
        }
        html += `<td style="text-align:center;font-weight:700">${step}</td>
          <td>${testStep}</td>
          <td style="font-size:12px">${expected}</td>
          ${statusCell}
          ${remarkCell}
        </tr>`;
      });
      });  // end subIds.forEach (per case in sub-scenario)
      });  // end subKeys.forEach (per sub-scenario in module)
    });   // end moduleOrder.forEach
    html += '</tbody></table>';
    container.innerHTML = html;
  } catch (e) {
    container.innerHTML = `<div class="empty" style="color:#dc2626">Error: ${esc(e.message || e)}</div>`;
  }
}

// Load test cases (xlsx files) จาก csv_dirs ของ project — render เป็น checkbox list (multi-select)
// selectedPaths: string (comma หรือ newline separated) หรือ array
// Filter ตามค่า category dropdown (#colCategory): ui → */ui/ only, e2e → */e2e/ only, integration → (TBD)
async function loadTestCasesIntoSelect(projectId, selectedPaths) {
  const container = document.getElementById('colTestCasePathList');
  const hidden = document.getElementById('colTestCasePath');
  if (!container || !hidden) return;

  // Parse selected paths (รองรับทั้ง string + array)
  let selected = [];
  if (Array.isArray(selectedPaths)) selected = selectedPaths;
  else if (typeof selectedPaths === 'string' && selectedPaths.trim()) {
    selected = selectedPaths.split(/[\n,]/).map(s => s.trim()).filter(Boolean);
  }
  const selectedSet = new Set(selected);

  // Filter ตามหมวด (category)
  const catSel = document.getElementById('colCategory');
  const currentCat = catSel ? catSel.value : '';

  // ติด listener ครั้งเดียว: เมื่อหมวดเปลี่ยน → re-render list
  if (catSel && !catSel.dataset.tcListener) {
    catSel.dataset.tcListener = '1';
    catSel.addEventListener('change', () => {
      // อ่าน selected paths จาก hidden เพื่อรักษาการเลือก
      const cur = (hidden.value || '').split(/[\n,]/).map(s => s.trim()).filter(Boolean);
      loadTestCasesIntoSelect(projectId, cur);
    });
  }

  try {
    const data = await api.get(`/api/projects/${projectId}/test-cases`);
    let items = data.test_cases || [];

    // Filter by category
    // Convention:
    //   - Subfolder /ui/   → UI tests
    //   - Subfolder /e2e/  → E2E tests
    //   - Subfolder /integration/ → Integration tests
    //   - Files at the project root (no ui/e2e/integration subfolder) → treated as UI
    //     (legacy + new pattern where backoffice xlsx live directly under .../test-cases/<svc>/)
    const isInSubfolder = (folder, cat) => new RegExp(`/${cat}(/|$)`).test(folder);
    const isInAnyCategorySubfolder = (folder) =>
      isInSubfolder(folder, 'ui') ||
      isInSubfolder(folder, 'e2e') ||
      isInSubfolder(folder, 'integration');

    if (currentCat === 'ui') {
      items = items.filter(it => isInSubfolder(it.folder, 'ui') || !isInAnyCategorySubfolder(it.folder));
    } else if (currentCat === 'e2e') {
      items = items.filter(it => isInSubfolder(it.folder, 'e2e'));
    } else if (currentCat === 'integration') {
      items = items.filter(it => isInSubfolder(it.folder, 'integration'));
    }
    // currentCat === '' → แสดงทั้งหมด (ยังไม่ได้เลือกหมวด)

    if (!items.length) {
      const hint = currentCat
        ? `ไม่มี test case xlsx สำหรับหมวด <b>${esc(currentCat.toUpperCase())}</b>`
        : 'ไม่มี test case xlsx';
      container.innerHTML = `<div style="color:#9ca3af;font-size:12px;font-style:italic;text-align:left">${hint}</div>`;
      hidden.value = '';
      return;
    }
    // Group by folder for clearer UI
    const groups = {};
    items.forEach(it => {
      const folder = (it.folder || '').split('/').slice(-2).join('/');  // "login/ui"
      (groups[folder] = groups[folder] || []).push(it);
    });

    const updateHidden = () => {
      const checks = container.querySelectorAll('input[type="checkbox"][data-path]:checked');
      const paths = Array.from(checks).map(c => c.dataset.path);
      hidden.value = paths.join('\n');
    };

    const html = ['<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid #f3f4f6;text-align:left">',
      '<button type="button" class="btn btn-ghost btn-sm" onclick="document.querySelectorAll(\'#colTestCasePathList input[type=checkbox][data-path]\').forEach(c=>c.checked=true);document.getElementById(\'colTestCasePathList\').dispatchEvent(new Event(\'change\',{bubbles:true}))" style="font-size:11px;padding:3px 8px">✓ เลือกทั้งหมด</button>',
      '<button type="button" class="btn btn-ghost btn-sm" onclick="document.querySelectorAll(\'#colTestCasePathList input[type=checkbox][data-path]\').forEach(c=>c.checked=false);document.getElementById(\'colTestCasePathList\').dispatchEvent(new Event(\'change\',{bubbles:true}))" style="font-size:11px;padding:3px 8px">✗ ล้างทั้งหมด</button>',
      `<span id="colTestCasePathCount" style="margin-left:auto;font-size:11px;color:#6b7280">เลือกแล้ว <b>${selected.length}</b> รายการ</span>`,
      '</div>'];
    Object.keys(groups).sort().forEach(folder => {
      html.push(`<div style="margin-bottom:8px;text-align:left"><div style="font-size:11px;font-weight:700;color:#4338ca;background:#eef2ff;padding:3px 8px;border-radius:4px;margin-bottom:4px;text-align:left">📁 ${esc(folder)}</div>`);
      groups[folder].forEach(it => {
        const checked = selectedSet.has(it.path) ? 'checked' : '';
        const safePath = esc(it.path);
        // ใช้ <div role="button"> แทน <label> เพราะ .modal label มี display:block + margin override
        // กดที่ row → toggle checkbox ผ่าน onclick
        html.push(`<div onclick="var c=this.querySelector('input[type=checkbox]');if(event.target!==c){c.checked=!c.checked;c.dispatchEvent(new Event('change',{bubbles:true}))}" style="display:flex;align-items:center;gap:8px;padding:6px 8px;font-size:12px;cursor:pointer;border-radius:4px;text-align:left;margin:0" onmouseover="this.style.background='#f9fafb'" onmouseout="this.style.background='transparent'">
          <input type="checkbox" data-path="${safePath}" ${checked} style="width:16px;height:16px;margin:0;padding:0;cursor:pointer;flex-shrink:0;border:1px solid #d1d5db">
          <span style="font-family:ui-monospace,Menlo,monospace;text-align:left;flex:1;color:#374151">${esc(it.name)}</span>
        </div>`);
      });
      html.push('</div>');
    });
    container.innerHTML = html.join('');

    // Update hidden + count on any checkbox change
    container.addEventListener('change', () => {
      updateHidden();
      const count = container.querySelectorAll('input[type="checkbox"][data-path]:checked').length;
      const cnt = document.getElementById('colTestCasePathCount');
      if (cnt) cnt.innerHTML = `เลือกแล้ว <b>${count}</b> รายการ`;
    });

    // Sync hidden value with initial selection
    updateHidden();
  } catch (e) {
    container.innerHTML = `<div style="color:#dc2626;font-size:12px">Error: ${esc(e.message || e)}</div>`;
  }
}

// ทำซ้ำ collection — เปิด Create modal พร้อม prefill ทุก field ยกเว้น JIRA Run task และผลรัน
function duplicateCollection(cid) {
  const c = (STATE.collections || []).find(x => x.id === cid);
  if (!c) { alert('ไม่พบ collection'); return; }
  openCreateCollectionModal({
    name: (c.name || '') + ' (copy)',
    preset: c.preset || '',
    type: c.type || '',
    category: c.category || '',
    preset_url: c.preset_url || '',
    excel_path: c.excel_path || '',
    test_case_path: c.test_case_path || '',
    result_url: c.result_url || '',
    jira_epic: c.jira_epic || '',
    jira_run: '',  // เคลียร์ — บังคับให้ user ใส่ใหม่
    kb_path: c.kb_path || '',
  });
}

// แก้ไข collection จาก row ใน list — load detail ก่อนแล้วเรียก renameCollection
async function editCollectionFromList(cid) {
  // จำ selected เดิมไว้ (null ถ้าอยู่หน้า list) — ใช้ restore หลัง submit เพื่อไม่ให้กระโดดเข้า detail view
  STATE._editFromListPrevId = STATE.selectedCollectionId || null;

// ลบ collection จาก row ใน list — ไม่ต้องเปลี่ยน selected (ผู้ใช้ยังอยู่ที่ list view)
async function deleteCollectionFromList(cid) {
  const c = (STATE.collections || []).find(x => x.id === cid);
  const label = c ? `"${c.name}"` : cid;
  if (!confirm(`ลบ Collection ${label}? (ไฟล์ผลการรันจริงไม่ถูกลบ)`)) return;
  const pid = STATE.currentProject.id;
  await api.del(`/api/projects/${pid}/collections/${encodeURIComponent(cid)}`);
  // ถ้า collection ที่ลบเป็นตัวที่ถูก select อยู่ — เคลียร์ state
  if (STATE.selectedCollectionId === cid) {
    STATE.selectedCollectionId = null;
    STATE.selectedCollection = null;
  }
  await loadCollections();
  render();
}

// แสดง/ซ่อน KB field ตาม preset
function toggleKbField(preset) {
  const row = document.getElementById('colKbPathRow');
  if (!row) return;
  row.style.display = /-rag$/i.test(preset || '') ? '' : 'none';
}

// submit ฟอร์ม → POST /api/projects/<pid>/collections → เปิด detail ทันที
async function submitCreateCollection() {
  const isBackoffice = isBackofficeFormat(STATE.currentProject);
  const getVal = (id) => {
    const el = document.getElementById(id);
    return el ? (el.value || '').trim() : '';
  };
  const name = getVal('colName');
  const type = getVal('colType');
  const category = getVal('colCategory');
  const presetUrl = getVal('colPresetUrl');
  const preset = getVal('colPreset');
  const excelPath = getVal('colExcelPath');
  const testCasePath = getVal('colTestCasePath');
  const resultUrl = getVal('colResultUrl');
  const jiraEpic = getVal('colJiraEpic');
  const jiraRun = getVal('colJiraRun');
  const kbPath = getVal('colKbPath');

  // Required validation — Backoffice ไม่ validate Preset/Type/TestCasePath/PresetURL (ฟอร์มไม่แสดง)
  const missing = [];
  if (!name) missing.push('ชื่อ Collection');
  if (!isBackoffice && !preset) missing.push('Preset');
  if (!isBackoffice && !type) missing.push('ประเภท');
  if (!category) missing.push('หมวด');
  if (!testCasePath) missing.push('Test Case path');
  // excel_path + result_url: optional (result_url auto-generate หลังกดสร้าง)
  if (!jiraEpic) missing.push('JIRA Epic');
  if (!jiraRun) missing.push('JIRA Run task');
  if (!isBackoffice && !presetUrl) missing.push('Preset URL');
  if (missing.length) {
    alert('กรุณากรอก: ' + missing.join(', '));
    const idMap = {'ชื่อ Collection':'colName','Preset':'colPreset','ประเภท':'colType','หมวด':'colCategory','Test Case path':'colTestCasePath','Excel Test Result path':'colExcelPath','URL ผลการรัน':'colResultUrl','JIRA Epic':'colJiraEpic','JIRA Run task':'colJiraRun','Preset URL':'colPresetUrl'};
    const el = document.getElementById(idMap[missing[0]]);
    if (el) el.focus();
    return;
  }

  const pid = STATE.currentProject.id;
  const payload = {
    name,
    type, category, preset,
    preset_url: presetUrl,
    excel_path: excelPath,
    test_case_path: testCasePath,
    result_url: resultUrl,
    jira_epic: jiraEpic,
    jira_run: jiraRun,
    kb_path: kbPath.trim(),
  };
  const res = await api.post(`/api/projects/${pid}/collections`, payload);
  if (res.collection) {
    // Auto-fill Collection URL + Result URL ด้วย collection id ที่ backend สร้างให้
    if (res.collection.id) {
      const autoUrl = `${window.location.origin}/${pid}/collections/${res.collection.id}`;
      const autoResultUrl = `${autoUrl}?runInstr=summary`;
      await api.patch(`/api/projects/${pid}/collections/${res.collection.id}`, {
        collection_url: autoUrl,
        result_url: autoResultUrl,
      });
      res.collection.collection_url = autoUrl;
      res.collection.result_url = autoResultUrl;
    }
    closeModal();
    // คงไว้ที่หน้า list + refresh ตาราง — ไม่เด้งเข้า detail view
    STATE.selectedCollectionId = null;
    STATE.selectedCollection = null;
    STATE.collectionPage = 1;
    await loadCollections();
    syncUrl();
    render();
  } else {
    alert('Error: ' + (res.error || 'unknown'));
  }
}

// ลบ collection ปัจจุบัน (confirm ก่อน) — ไฟล์ผลการรันจริงไม่ถูกลบ
async function deleteCurrentCollection() {
  if (!confirm('ลบ Collection นี้? (ไฟล์ผลการรันจริงไม่ถูกลบ)')) return;
  const pid = STATE.currentProject.id;
  await api.del(`/api/projects/${pid}/collections/${encodeURIComponent(STATE.selectedCollectionId)}`);
  STATE.selectedCollectionId = null;
  STATE.selectedCollection = null;
  await loadCollections();
  syncUrl();
  render();
}

// เปิด modal "+ เพิ่มการรัน" — 2 options:
//   A) ผูก run ที่มีอยู่เข้า collection
//   B) สร้าง pytest cmd ใหม่ (เลือก preset/type/marker/cases) เพื่อรัน
function openAddRunModal() {
  const proj = STATE.currentProject;
  const rc = proj.run_cmd || {};
  const presets = rc.presets || [];
  const types = rc.types || [];
  const markers = rc.markers || ['all'];

  // Build list of existing runs not yet in collection
  const inCol = new Set((STATE.selectedCollection?.collection?.run_ids) || []);
  const available = STATE.runs.filter(r => !inCol.has(r.run_id));

  let html = `<h2>+ เพิ่มการรันเข้า Collection</h2>`;

  // Option A: existing run (มีช่องค้นหา filter options)
  if (available.length > 0) {
    html += `<label>เลือก Run ที่รันไปแล้ว</label>
    <input type="text" id="existingRunFilter" placeholder="🔍 ค้นหา (เช่น walk, crawl, run, 20260423)..." oninput="filterExistingRunOptions()" style="width:100%;padding:6px 10px;border:1px solid #d1d5db;border-radius:6px;margin-bottom:6px;font-size:13px">
    <select id="existingRun" size="8" style="width:100%">
      <option value="">— (รัน pytest ใหม่ด้านล่าง) —</option>
      ${available.map(r => {
        // Label แสดงแค่ shortened run_id (เช่น kaew-rag-fast-20260423-15:40:39)
        // data-search เก็บ label + ts + score ให้ค้นได้
        const label = shortenRunId(r.run_id);
        const ts = r.timestamp ? new Date(r.timestamp).toLocaleString('th-TH') : '';
        const searchKey = `${label} ${ts} ${r.run_id} ${r.passed}/${r.total}`.toLowerCase();
        return `<option value="${esc(r.run_id)}" data-search="${esc(searchKey)}">${esc(label)}</option>`;
      }).join('')}
    </select>
    <div style="font-size:11px;color:#9ca3af;margin-top:4px">แสดง <span id="existingRunCount">${available.length}</span>/${available.length} รายการ</div>
    <button class="btn btn-primary btn-sm" style="margin-top:8px" onclick="submitAddExistingRun()">ผูก Run นี้เข้า Collection</button>
    <hr style="margin:18px 0;border:none;border-top:1px solid #e5e7eb">`;
  }

  // Option B: generate pytest cmd
  html += `<h3 style="font-size:14px;margin-bottom:8px">หรือสร้างคำสั่งรัน pytest ใหม่:</h3>`;

  if (presets.length) {
    html += `<label>Preset</label><select id="preset">${presets.map(p => `<option value="${esc(p)}">${esc(p)}</option>`).join('')}</select>`;
  }
  if (types.length) {
    html += `<label>Test Type</label><select id="ttype">
      <option value="all">ทั้งหมด</option>
      ${types.map(t => `<option value="${esc(t)}">${esc(t)}</option>`).join('')}
    </select>`;
  }
  html += `<label>Scope</label>
    <select id="scope">
      ${markers.map(m => `<option value="marker:${esc(m)}">Marker: ${esc(m)}</option>`).join('')}
      <option value="cases">บาง Test IDs (ระบุด้านล่าง)</option>
    </select>
    <label>Test IDs (comma-separated, ใส่ full หรือ short ก็ได้ — pytest -k match substring เช่น "KAEW-NR-C001" หรือ "C001")</label>
    <input id="caseIds" placeholder="KAEW-NR-C001, KAEW-NR-C002">`;

  html += `<div id="cmdPreview" style="display:none;margin-top:12px">
    <label>คำสั่งที่ต้องรันใน terminal:</label>
    <div class="cmd-box" id="cmdText"></div>
    <div class="inline-hint">Copy แล้วรันใน terminal — เมื่อรันเสร็จ ไฟล์ผลจะเข้า collection นี้อัตโนมัติ (refresh หน้านี้)</div>
    <button class="btn btn-primary btn-sm" style="margin-top:10px" onclick="copyGenCmd()">📋 คัดลอกคำสั่ง</button>
  </div>`;

  html += `<div class="modal-actions">
    <button class="btn btn-ghost btn-sm" onclick="closeModal()">ปิด</button>
    <button class="btn btn-primary btn-sm" onclick="buildCmdPreview()">สร้างคำสั่ง</button>
  </div>`;

  openModal(html);
}

// Option A: ผูก run ที่มีอยู่ → POST /api/.../collections/<cid>/runs
async function submitAddExistingRun() {
  const rid = document.getElementById('existingRun').value;
  if (!rid) { alert('เลือก run ก่อน'); return; }
  const pid = STATE.currentProject.id;
  const cid = STATE.selectedCollectionId;
  await api.post(`/api/projects/${pid}/collections/${encodeURIComponent(cid)}/runs`, {run_id: rid});
  closeModal();
  STATE.selectedCollection = null;
  render();
}

// Filter options ใน existingRun select ตาม text ที่พิมพ์ในช่องค้นหา
// ใช้ data-search attribute (lowercase) match กับ query (lowercase)
function filterExistingRunOptions() {
  const q = (document.getElementById('existingRunFilter').value || '').trim().toLowerCase();
  const sel = document.getElementById('existingRun');
  const count = document.getElementById('existingRunCount');
  let shown = 0;
  let total = 0;
  for (const opt of sel.options) {
    if (!opt.value) { continue; }  // skip placeholder option
    total += 1;
    const hay = opt.dataset.search || opt.textContent.toLowerCase();
    // รองรับหลายคำค้นคั่นด้วย space — ต้องเจอทุกคำ (AND)
    const terms = q.split(/\s+/).filter(Boolean);
    const match = terms.every(t => hay.includes(t));
    opt.hidden = !match;
    if (match) shown += 1;
  }
  if (count) count.textContent = shown;
}

// Option B: สร้าง pytest cmd — รวม TEST_COLLECTION_ID env + -k filter ให้พร้อม copy
function buildCmdPreview() {
  const proj = STATE.currentProject;
  const rc = proj.run_cmd || {};
  const preset = document.getElementById('preset')?.value || '';
  const ttype = document.getElementById('ttype')?.value || '';
  const scope = document.getElementById('scope').value;
  const cid = STATE.selectedCollectionId;

  let testPath = '';
  if (preset && ttype) {
    // "all" = ทุก test file ใน preset (pytest จะเก็บ test_*.py ทั้งหมด)
    testPath = ttype === 'all' ? preset : `${preset}/test_${ttype}.py`;
  }

  let args = '-v -s';
  if (scope.startsWith('marker:')) {
    const marker = scope.substring('marker:'.length);
    if (marker && marker !== 'all') args += ` -m ${marker}`;
    else args += ` -m all`;
  } else if (scope === 'cases') {
    const ids = (document.getElementById('caseIds').value || '').split(',').map(s => s.trim()).filter(Boolean);
    if (!ids.length) { alert('ใส่ test IDs ก่อน'); return; }
    args += ` -k "${ids.join(' or ')}"`;
  }

  const cwd = rc.cwd || '';
  const absCwd = STATE.repoRoot && cwd ? `${STATE.repoRoot.replace(/\/$/,'')}/${cwd}` : cwd;
  const pytestBin = resolvePytestBin(STATE.currentProject);
  const cmd = `${absCwd ? 'cd ' + absCwd + ' && ' : ''}TEST_COLLECTION_ID=${cid} ${pytestBin} ${testPath} ${args}`;

  document.getElementById('cmdText').textContent = cmd;
  document.getElementById('cmdPreview').style.display = 'block';
}

// Copy pytest cmd ที่ gen ไว้ไปยัง clipboard
async function copyGenCmd() {
  const cmd = document.getElementById('cmdText').textContent;
  await navigator.clipboard.writeText(cmd);
  alert('คัดลอกแล้ว! เปิด terminal แล้ว paste รัน');
}

// ยกเลิกการแก้ไข — restore selected เดิม (กรณีเปิดจาก list) ไม่ให้กระโดดเข้า detail
function cancelRenameCollection() {
  restoreSelectedAfterListEdit();
  closeModal();
}

async function submitRenameCollection() {
  const getVal = (id) => {
    const el = document.getElementById(id);
    return el ? (el.value || '').trim() : '';
  };
  const name = getVal('colName');
  const type = getVal('colType');
  const category = getVal('colCategory');
  const colUrl = getVal('colUrl');
  const presetUrl = getVal('colPresetUrl');
  const preset = getVal('colPreset');
  const excelPath = getVal('colExcelPath');
  const testCasePath = getVal('colTestCasePath');
  const resultUrl = getVal('colResultUrl');
  const jiraEpic = getVal('colJiraEpic');
  const jiraRun = getVal('colJiraRun');
  const kbPath = getVal('colKbPath');
  if (!name) { alert('กรุณาใส่ชื่อ'); return; }
  // Required validation
  const missing = [];
  if (!testCasePath) missing.push('Test Case path');
  // excel_path + result_url: optional (result_url auto-generate หลังกดสร้าง)
  if (!jiraEpic) missing.push('JIRA Epic');
  if (!jiraRun) missing.push('JIRA Run task');
  if (missing.length) {
    alert('กรุณากรอก: ' + missing.join(', '));
    const idMap = {'Test Case path':'colTestCasePath','Excel Test Result path':'colExcelPath','URL ผลการรัน':'colResultUrl','JIRA Epic':'colJiraEpic','JIRA Run task':'colJiraRun'};
    const el = document.getElementById(idMap[missing[0]]);
    if (el) el.focus();
    return;
  }
  const col = STATE.selectedCollection.collection;
  const payload = {};
  if (name !== (col.name || '')) payload.name = name;
  if (type !== (col.type || '')) payload.type = type;
  if (category !== (col.category || '')) payload.category = category;
  if (colUrl !== (col.collection_url || '')) payload.collection_url = colUrl;
  if (presetUrl !== (col.preset_url || '')) payload.preset_url = presetUrl;
  if (preset !== (col.preset || '')) payload.preset = preset;
  if (excelPath !== (col.excel_path || '')) payload.excel_path = excelPath;
  if (testCasePath !== (col.test_case_path || '')) payload.test_case_path = testCasePath;
  if (resultUrl !== (col.result_url || '')) payload.result_url = resultUrl;
  if (jiraEpic !== (col.jira_epic || '')) payload.jira_epic = jiraEpic;
  if (jiraRun !== (col.jira_run || '')) payload.jira_run = jiraRun;
  if (kbPath !== (col.kb_path || '')) payload.kb_path = kbPath;
  if (Object.keys(payload).length === 0) { restoreSelectedAfterListEdit(); closeModal(); return; }
  const pid = STATE.currentProject.id;
  const cid = STATE.selectedCollectionId;
  await api.patch(`/api/projects/${pid}/collections/${encodeURIComponent(cid)}`, payload);
  closeModal();
  STATE.selectedCollection = null;
  restoreSelectedAfterListEdit();
  // reload list เพื่อให้ row แสดงข้อมูลล่าสุด
  if (STATE.selectedCollectionId == null) await loadCollections();
  render();
}

// ถ้า edit ถูกเปิดจากหน้า list — restore selectedCollectionId เดิม (null) เพื่อให้กลับไปหน้า list
function restoreSelectedAfterListEdit() {
  if ('_editFromListPrevId' in STATE) {
    STATE.selectedCollectionId = STATE._editFromListPrevId;
    STATE.selectedCollection = null;
    delete STATE._editFromListPrevId;
  }
}

// แก้คำอธิบาย collection
async function editCollectionDescription() {
  if (!STATE.selectedCollection) return;
  const cur = STATE.selectedCollection.collection.description || '';
  const next = prompt('คำอธิบาย Collection:', cur);
  if (next == null) return;
  if (next === cur) return;
  const pid = STATE.currentProject.id;
  const cid = STATE.selectedCollectionId;
  await api.patch(`/api/projects/${pid}/collections/${encodeURIComponent(cid)}`, {description: next});
  STATE.selectedCollection = null;
  render();
}

// ============================================================
// 14. MODAL HELPERS — เปิด/ปิด modal popup
// ============================================================
function openModal(html) {
  // ปุ่ม × ปิด — ลอยมุมขวาบนของทุก modal ผ่าน position:absolute
  const closeBtn = `<button onclick="closeModal()" title="ปิด" aria-label="ปิด" style="position:absolute;top:10px;right:12px;width:28px;height:28px;border:none;background:transparent;color:#6b7280;font-size:22px;line-height:1;cursor:pointer;border-radius:6px;padding:0" onmouseover="this.style.background='#f3f4f6';this.style.color='#1a1a2e'" onmouseout="this.style.background='transparent';this.style.color='#6b7280'">×</button>`;
  document.getElementById('modalRoot').innerHTML = `<div class="modal-overlay"><div class="modal" style="position:relative">${closeBtn}${html}</div></div>`;
}

function closeModal() {
  // ถ้ามี state จาก editCollectionFromList ค้างอยู่ ให้ restore กลับเป็น list view
  // (function check `_editFromListPrevId` ก่อน — ถ้าไม่มี = noop)
  if (typeof restoreSelectedAfterListEdit === 'function') restoreSelectedAfterListEdit();
  document.getElementById('modalRoot').innerHTML = '';
}
