<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Test Reports — RealFact</title>
<style>
/* ============================================================
 * RESET + BASE
 * ============================================================ */
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',sans-serif;background:#f0f2f5;color:#1a1a2e;font-size:13px}

/* ============================================================
 * HEADER (bar บนสุด — โลโก้ + project selector + status)
 * ============================================================ */
header{background:#1a1a2e;color:#fff;padding:16px 32px;display:flex;align-items:center;gap:20px;flex-wrap:wrap}
header h1{font-size:17px;font-weight:700;white-space:nowrap}
header .sub{font-size:11px;opacity:.5;margin-left:auto}

/* ============================================================
 * LAYOUT — sidebar (project menu) + main content
 * ============================================================ */
.layout{max-width:1740px;margin:20px auto;padding:0 20px;display:flex;align-items:flex-start;gap:24px}
.layout .container{margin:0;padding:0;flex:1;min-width:0;max-width:none}

/* Sidebar (aside) — project menu แนวตั้ง */
.sidebar{flex:0 0 200px;position:sticky;top:20px}
.sidebar-label{font-size:11px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:#9ca3af;padding:0 12px 8px}
.project-menu{display:flex;flex-direction:column;gap:4px;background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:6px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.project-menu button{display:block;width:100%;text-align:left;padding:9px 12px;font-size:13px;font-weight:600;border:none;background:transparent;color:#374151;cursor:pointer;border-radius:7px;transition:all .12s;font-family:inherit}
.project-menu button:hover:not(.active){background:#f3f4f6;color:#1a1a2e}
.project-menu button.active{background:#1a1a2e;color:#fff;box-shadow:0 2px 6px rgba(26,26,46,.25)}

/* จอแคบ → sidebar ขึ้นบน, เมนูเรียงแนวนอน */
@media(max-width:900px){
  .layout{flex-direction:column}
  .sidebar{position:static;flex:none;width:100%}
  .sidebar-label{padding-bottom:6px}
  .project-menu{flex-direction:row;flex-wrap:wrap}
  .project-menu button{width:auto}
}

/* ============================================================
 * LAYOUT CONTAINER — ขอบเขตหลักของเนื้อหา
 * ============================================================ */
.container{max-width:1500px;margin:20px auto;padding:0 20px}

/* ============================================================
 * TOOLBAR — แถบเครื่องมือ (dropdown, search, ปุ่ม action)
 * ใช้ใน: Runs view (date/run selector), Collections list (search+type+date)
 * ============================================================ */
.toolbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:14px}
.toolbar label{font-size:12px;font-weight:600;color:#555}
.toolbar select{padding:7px 10px;border:1px solid #d1d5db;border-radius:6px;font-size:13px;background:#fff;cursor:pointer;min-width:220px}
/* Compact variants — dropdown ปี/เดือน/วัน (กว้างแค่พอดี) */
.toolbar select.sel-sm{min-width:auto;padding-right:26px}
.toolbar select.sel-year{width:92px}
.toolbar select.sel-mon,.toolbar select.sel-day{width:82px}
.toolbar input[type=search]{padding:7px 10px;border:1px solid #d1d5db;border-radius:6px;font-size:13px;background:#fff;min-width:200px;font-family:inherit}
.toolbar input[type=search]:focus{outline:none;border-color:#4338ca}

/* ============================================================
 * MAIN TABS — แท็บหลัก (📋 ผลการรัน / 🗂 รวมผลการรัน)
 * ============================================================ */
.tabs{display:flex;gap:10px;margin-bottom:16px}
.tab{padding:10px 18px;font-size:13px;font-weight:600;border:1px solid #d1d5db;background:#fff;cursor:pointer;color:#6b7280;border-radius:8px;transition:all .15s;box-shadow:0 1px 2px rgba(0,0,0,.04)}
.tab.active{color:#fff;background:#1a1a2e;border-color:#1a1a2e;box-shadow:0 2px 6px rgba(26,26,46,.25)}
.tab:hover:not(.active){color:#1a1a2e;border-color:#9ca3af;background:#f9fafb}

/* ============================================================
 * SUMMARY CARDS — การ์ดสรุป Total / PASS / FAIL / Pending / Rate / Duration
 * ============================================================ */
.summary{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;margin-bottom:16px}
.card{padding:16px 20px;border-radius:10px;background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.card .num{font-size:26px;font-weight:700;line-height:1.1}
.card .lbl{font-size:12px;color:#6b7280;margin-top:4px;text-transform:uppercase;letter-spacing:.6px}
.card.pass .num{color:#10b981}   /* เขียว — PASS */
.card.improvement .num{color:#3b82f6}   /* น้ำเงิน — IMPROVEMENT */
.card.fail .num{color:#ef4444}   /* แดง — FAIL */
.card.pending .num{color:#f59e0b} /* ส้ม — PENDING */
.card.reopen .num{color:#db2777} /* ชมพู — REOPEN */
.card.rate .num{color:#4338ca}   /* ม่วง — Pass Rate */

/* ============================================================
 * PROGRESS BAR — แถบ pass rate สีตามระดับ
 * ============================================================ */
.bar{height:6px;background:#e5e7eb;border-radius:3px;overflow:hidden;margin-bottom:16px}
.bar-fill{height:100%;transition:width .3s;background:#4338ca}
.bar-fill.good{background:#10b981}  /* ≥90% */
.bar-fill.warn{background:#f59e0b}  /* 70-89% */
.bar-fill.bad{background:#ef4444}   /* <70% */

/* ============================================================
 * FILTER ROW — ปุ่มกรอง All / PASS / FAIL / PENDING
 * ============================================================ */
.filter-row{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.fbtn{padding:6px 14px;font-size:12px;border:1px solid #d1d5db;border-radius:18px;background:#fff;cursor:pointer;color:#6b7280}
.fbtn.active{background:#1a1a2e;color:#fff;border-color:#1a1a2e}

/* ============================================================
 * RESULTS TABLE — ตารางแสดงผลลัพธ์ test cases
 * ============================================================ */
table{width:100%;border-collapse:separate;border-spacing:0;background:#fff;border-radius:10px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.06);font-size:11px}
th{background:#1a1a2e;color:#fff;padding:10px;text-align:left;font-size:11px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;position:sticky;top:0;z-index:10}
td{padding:10px;border-bottom:1px solid #e5e7eb;vertical-align:top;font-size:11px;text-align:left;white-space:pre-wrap;word-break:break-word}
tr:last-child td{border-bottom:none}

/* ============================================================
 * STATUS BADGE — ป้ายสถานะในคอลัมน์ Status (PASS/FAIL/PENDING)
 * ============================================================ */
.badge{display:inline-block;padding:3px 10px;border-radius:12px;font-size:11px;font-weight:700}
.badge.pass{background:#d1fae5;color:#065f46}
.badge.improvement{background:#dbeafe;color:#1e40af}
.badge.fail{background:#fee2e2;color:#991b1b}
.badge.pending{background:#fef3c7;color:#92400e}
.badge.reopen{background:#fce7f3;color:#9d174d}

/* ============================================================
 * TAG — ป้ายสำหรับ scenario / ประเภท collection
 * ============================================================ */
.tag{display:inline-block;padding:3px 8px;background:#eef2ff;color:#4338ca;border-radius:10px;font-size:11px;font-weight:500}

/* ============================================================
 * BUTTONS — ปุ่มหลัก 4 style: primary / danger / ghost / sm
 * ============================================================ */
.btn{padding:8px 14px;font-size:12px;font-weight:600;border-radius:7px;cursor:pointer;border:1px solid}
.btn-primary{background:#4338ca;color:#fff;border-color:#4338ca}
.btn-primary:hover{background:#3730a3}
.btn-danger{background:#fef2f2;color:#991b1b;border-color:#ef4444}
.btn-danger:hover{background:#fee2e2}
.btn-ghost{background:#fff;color:#4338ca;border-color:#c7d2fe}
.btn-ghost:hover{background:#eef2ff}
.btn-sm{padding:5px 10px;font-size:11px}

/* ============================================================
 * EMPTY STATE — ข้อความเมื่อไม่มีข้อมูลให้แสดง
 * ============================================================ */
.empty{text-align:center;padding:40px;color:#9ca3af;font-style:italic}

/* ============================================================
 * SUB-TABS — แท็บย่อยในหน้า Collection Detail (Effective + แต่ละ Run)
 * ============================================================ */
.sub-tabs{display:flex;gap:4px;margin:14px 0 12px;flex-wrap:wrap;border-bottom:1px solid #e5e7eb;padding-bottom:0}
.sub-tab{padding:7px 14px;font-size:12px;font-weight:500;border:none;background:none;cursor:pointer;color:#6b7280;border-bottom:2px solid transparent;margin-bottom:-1px}
.sub-tab.active{color:#1a1a2e;border-bottom-color:#4338ca;font-weight:600}

/* ============================================================
 * MODAL — popup สำหรับสร้าง Collection / เพิ่ม Run
 * ============================================================ */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:100}
.modal{background:#fff;border-radius:10px;padding:24px;max-width:560px;width:90%;box-shadow:0 20px 40px rgba(0,0,0,.2);max-height:85vh;overflow:auto}
.modal h2{font-size:17px;margin-bottom:14px;color:#1a1a2e}
.modal label{display:block;font-size:12px;font-weight:600;color:#555;margin:10px 0 4px}
.modal input,.modal select,.modal textarea{width:100%;padding:8px 10px;border:1px solid #d1d5db;border-radius:6px;font-size:13px;font-family:inherit}
.modal input[type=checkbox]{width:16px;height:16px;padding:0;margin:0;flex:none}
#colTestCasePathList{text-align:left}
#colTestCasePathList input[type=checkbox]{width:16px !important;height:16px !important}
.modal textarea{min-height:70px;resize:vertical}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:18px}

/* ============================================================
 * CMD BOX — กล่องโค้ด (preview pytest cmd ใน modal)
 * ============================================================ */
.cmd-box{background:#1a1a2e;color:#a5f3fc;padding:12px 14px;border-radius:7px;font-family:monospace;font-size:11px;margin-top:8px;word-break:break-all;line-height:1.5}

/* ============================================================
 * COLLECTION CARD — การ์ดแสดง collection ในหน้า list
 * ============================================================ */
.collection-card{background:#fff;padding:14px 18px;border-radius:10px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;border:1px solid #e5e7eb;cursor:pointer}
.collection-card:hover{border-color:#4338ca;background:#fafbff}
.collection-card .meta{font-size:11px;color:#6b7280;margin-top:3px}

/* ============================================================
 * MISC TEXT — ข้อความเล็กๆสำหรับ metadata
 * ============================================================ */
.small-num{font-size:10px;color:#6b7280;margin-left:6px;font-weight:500}
.run-multi{font-size:10px;color:#4338ca;margin-left:6px}  /* indicator 🔁 N runs */

/* ============================================================
 * RUN CHIP — ชิปแสดง run พร้อมปุ่มลบ (ในหน้า Collection Detail)
 * ============================================================ */
.run-chip{display:inline-flex;align-items:center;gap:10px;padding:8px 8px 8px 14px;background:#f3f4f6;border:1px solid #e5e7eb;border-radius:20px;margin:4px 8px 4px 0;font-size:13px;transition:all .15s}
.run-chip:hover{background:#eef2ff;border-color:#c7d2fe}
.run-chip .x{cursor:pointer;color:#fff;background:#ef4444;font-weight:700;width:22px;height:22px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:13px;line-height:1;transition:all .15s;border:2px solid transparent}
.run-chip .x:hover{background:#dc2626;transform:scale(1.15);border-color:#fee2e2;box-shadow:0 2px 6px rgba(239,68,68,.4)}
.run-chip .x:active{transform:scale(0.95)}

/* ============================================================
 * INLINE HINT — ข้อความช่วยเหลือเล็กๆ ใต้ปุ่ม/ส่วนต่างๆ
 * ============================================================ */
.inline-hint{font-size:11px;color:#6b7280;margin-top:6px;font-style:italic}

/* ============================================================
 * RESPONSE vs EXPECTED — กล่องเปรียบเทียบ Avatar response กับ Expected
 * ใช้ใน: คอลัมน์ "Response vs Expected" ของตารางผลลัพธ์
 * ============================================================ */
.cmp-block{display:flex;flex-direction:column;gap:6px;max-width:400px}
.cmp-item{padding:6px 10px;border-radius:6px;font-size:12px;line-height:1.5;border-left:3px solid;word-break:break-word}
.cmp-avatar{background:#1a1a2e;color:#e0f2fe;border-left-color:#0ea5e9}   /* คำตอบ Avatar (พื้นเข้ม) */
.cmp-expected{background:#f0fdf4;color:#064e3b;border-left-color:#10b981} /* Expected (พื้นเขียวอ่อน) */
.cmp-label{font-size:10px;font-weight:700;text-transform:uppercase;margin-bottom:3px;opacity:.8}

/* ============================================================
 * AI REMARK — แถวคะแนน grader (latency / faithfulness / correctness / hallucination)
 * ============================================================ */
.remark-item{display:flex;gap:6px;margin-bottom:4px;font-size:11px;max-width:350px;word-break:break-word}
.turn-row td{border-bottom:1px dashed #e5e7eb}
.turn-row:last-child td{border-bottom:1px solid #d1d5db}
.remark-bullet{width:15px;height:15px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;flex-shrink:0}
.rb-pass{background:#d1fae5;color:#065f46}  /* ✓ เขียว */
.rb-fail{background:#fee2e2;color:#991b1b}  /* ✗ แดง */
.rb-warn{background:#fef3c7;color:#92400e}  /* ! เหลือง */
.rb-skip{background:#e5e7eb;color:#6b7280}  /* ⊘ เทา — ไม่ได้วัด (N/A) */
.remark-skip{opacity:.7;font-style:italic}  /* ทำให้ row N/A ดูจางลงเล็กน้อย */

/* JIRA refresh spinner */
@keyframes jspin { from {transform:rotate(0)} to {transform:rotate(360deg)} }
</style>
</head>
<body>

<!-- ==========================================================
     HEADER — bar บนสุด
     - โลโก้ "🧪 Test Reports"
     - dropdown เลือก project (populate จาก GET /api/projects)
     - status bar (มุมขวา) แสดงจำนวน runs/collections
     ========================================================== -->
<header>
  <h1>🧪 Test Reports</h1>
  <div class="sub" id="statusBar">loading...</div>
</header>

<!-- ==========================================================
     MAIN LAYOUT — sidebar (project menu) + main content
     - aside.sidebar: เมนูเลือก project (เรียงแนวตั้ง)
     - main: แท็บหลัก + view containers ที่ render ตามแท็บ
     ========================================================== -->
<div class="layout">
  <!-- Project menu (aside) — populate จาก GET /api/projects ผ่าน renderProjectMenu() -->
  <aside class="sidebar">
    <div class="sidebar-label">Project</div>
    <nav id="projectMenu" class="project-menu"></nav>
  </aside>

  <div class="container">
    <!-- Main tabs (🗂 รวมผลการรัน / 📋 ผลการรัน / 🐛 JIRA) -->
    <div class="tabs">
      <button class="tab active" id="tabCols" onclick="setMainTab('collections')">🗂 รวมผลการรัน</button>
      <button class="tab" id="tabRuns" onclick="setMainTab('runs')">📋 ผลการรัน</button>
      <button class="tab" id="tabJira" onclick="setMainTab('jira')">🐛 JIRA</button>
    </div>

    <!-- View containers — JS render เนื้อหาเข้า 1 ในสามนี้ ตาม mainTab -->
    <div id="viewRuns"></div>
    <div id="viewCollections" style="display:none"></div>
    <div id="viewJira" style="display:none"></div>
  </div>
</div>

<!-- Modal root — popup เปิด/ปิดผ่าน openModal()/closeModal() -->
<div id="modalRoot"></div>

<script>
/* ============================================================
 * Test Reports UI — Multi-project frontend
 * ============================================================
 * โครงสร้าง (ตามลำดับในไฟล์):
 *   1. STATE               — global state ทั้งแอป
 *   2. API helpers         — fetch wrappers (get/post/patch/del)
 *   3. Utilities           — esc, runDateKey, classifyResult, etc.
 *   4. Acceptance Criteria — เกณฑ์ pass rate + render verdict
 *   5. Cases-to-Return     — จัดกลุ่ม FAIL เป็น 3 หมวด (Infra/Latency/Content)
 *   6. Breakdown           — สรุปแยกสาเหตุ
 *   7. Collection type     — infer type จาก run_ids
 *   8. URL routing         — parseUrl/buildUrl/syncUrl + popstate
 *   9. Init + API loaders  — init, onProjectChange, loadRuns, etc.
 *  10. Tab switching       — setMainTab
 *  11. Render dispatcher   — render() แยกไป Runs view หรือ Collections view
 *  12. Runs view           — renderRuns + table + filters + rerun cmd
 *  13. Collections view    — renderCollections (list mode + detail mode)
 *  14. Modal helpers       — openModal, closeModal
 *  15. Boot                — init()
 * ============================================================ */

// ============================================================
// 1. STATE — เก็บข้อมูลทั้งหมดของ UI ใน object เดียว
// ============================================================
let STATE = {
  repoRoot: '',  // absolute path ของ repo (ใช้ gen cmd แบบ cd absolute)
  projects: [],
  currentProject: null,
  mainTab: 'collections',
  runs: [],        // slim list for current project
  selectedRunId: null,
  selectedRunDetail: null,   // {run, meta}
  filter: 'all',
  runSearch: '',  // free-text search on run_id (runs view)
  dateFilter: {y: '', m: '', d: ''},  // '' = any — for runs view
  collectionDateFilter: {y: '', m: '', d: ''},  // for collections list
  collectionSearch: '',
  collectionType: 'all',  // all | crawl | walk | run | manual | mixed | empty
  collectionCategory: 'all',  // all | smoke | regression | all(category) | custom | none
  collectionPage: 1,  // pagination (page index, 1-based) — 25 rows per page
  collections: [],
  selectedCollectionId: null,
  selectedCollection: null,  // hydrated: {collection, runs, effective, meta}
  selectedCollectionJira: null,  // {configured, base_url, project_key, issues: [...]} | null = loading
  selectedCollectionJiraLoading: false,  // true = fetching (show spinner on refresh button)
  collectionSubTab: 'effective',
  jiraAll: null,  // {configured, base_url, project_key, collections: [{collection_id, collection_name, issues: [...]}, ...]} | null = not loaded
  jiraAllLoading: false,
  jiraView: 'by-collection',  // 'by-collection' | 'flat'
  lastScreenshot: {},  // { [collectionId]: {dir, ts} } — last screenshot output_dir per collection
  lastPdf: {},  // { [collectionId]: {path, ts} } — last PDF output_path per collection
};

// ============================================================
// 2. API HELPERS — fetch wrappers สำหรับเรียก server REST API
// ============================================================
const api = {
  get: (u) => fetch(u).then(r => r.json()),
  post: (u, body) => fetch(u, {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body||{})}).then(r=>r.json()),
  patch: (u, body) => fetch(u, {method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify(body||{})}).then(r=>r.json()),
  del: (u) => fetch(u, {method:'DELETE'}).then(r=>r.json()),
};

// ============================================================
// 3. UTILITIES — helper functions ใช้ซ้ำหลายที่
// ============================================================

// Escape HTML entities — ป้องกัน XSS + render string มี <,>,&,"," ได้
function esc(s) {
  if (s === null || s === undefined) return '';
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// Project ใช้รูปแบบ "backoffice" หรือไม่ (Category/Test-Case-paths modal, case_statuses, ฯลฯ)
// คุมด้วย field "format":"backoffice" ใน projects.json — ไม่ผูกกับ id ใด id หนึ่ง
// (legacy: id === 'backoffice' ยังถือว่าใช้รูปแบบนี้ แม้ไม่ได้ใส่ format)
function isBackofficeFormat(proj) {
  return !!proj && (proj.format === 'backoffice' || proj.id === 'backoffice');
}

// Extract YYYY-MM-DD จาก run.timestamp (fallback: parse จาก run_id ที่มี YYYYMMDD)
// ใช้ในการ filter runs ตามวันที่
function runDateKey(r) {
  if (r.timestamp) return r.timestamp.slice(0, 10);
  const m = (r.run_id || '').match(/(\d{8})/);
  return m ? `${m[1].slice(0,4)}-${m[1].slice(4,6)}-${m[1].slice(6,8)}` : '';
}

// จัดประเภท test result เป็น root-cause bucket (ใช้ใน breakdown + cases-to-return)
// Returns: 'pass' | 'pending' | 'timeout' | 'no_response' | 'latency_only' | 'content_fail' | 'mixed_fail' | 'other_fail'
function classifyResult(r) {
  const status = r.status;
  if (status === 'PASS') return 'pass';
  if (status === 'IMPROVEMENT') return 'improvement';
  if (status === 'PENDING') return 'pending';
  if (status === 'REOPEN') return 'reopen';
  const reason = r.reason || '';
  if (reason.startsWith('Error:')) return 'timeout';
  if (reason.startsWith('No response')) return 'no_response';
  const graders = r.graders || [];
  const hideLat = isLatencyHiddenForCurrentCollection();
  const latFail = !hideLat && graders.some(g => g.metric === 'response_latency' && g.result === 'FAIL');
  const contentFail = graders.some(g =>
    g.grader === 'llm' &&
    g.metric !== 'response_latency' &&
    (g.result === 'FAIL' || (g.score != null && g.score < 4))
  );
  if (latFail && contentFail) return 'mixed_fail';
  if (latFail) return 'latency_only';
  if (contentFail) return 'content_fail';
  return 'other_fail';
}

// Labels + สี + คำแนะนำ สำหรับแต่ละ bucket (ใช้ใน breakdown card)
const CAUSE_LABELS = {
  pass:         {label: 'PASS',            icon: '✅', color: '#10b981'},

// ============================================================
// 4. ACCEPTANCE CRITERIA — เกณฑ์ผ่าน/ไม่ผ่านของ collection
// ============================================================
// - Pass rate ต้อง ≥ 80%
// - แต่ละ test case ผ่าน = latency PASS + LLM graders ทุกตัว score ≥ 4/5
//   (ถ้า status === 'PASS' ก็หมายความว่าตรงเกณฑ์แล้ว — ตรงนี้แค่นับแยกว่ามิติไหน OK/ไม่ OK)
const CRITERIA = {
  passRate: 80,        // %  (สีเขียว = ≥80, เหลือง = 60-79, แดง = <60)
  nearThreshold: 60,   // %  ช่วง "ใกล้เคียง" (เหลือง)
  minLLMScore: 4,      // ใช้กับ faithfulness / correctness / hallucination
};

// Collections where the `response_latency` grader should be hidden from every
// view of the collection page (AI Remark bullets, Criteria card, Cases-to-Return,
// copy-prompt blocks). JSON data is untouched.
const LATENCY_HIDDEN_COLLECTIONS = new Set(['col-20260512-091316-eee6db', 'col-20260514-104354-45a7e7', 'col-20260515-110445-002807', 'col-20260522-134756-c6606b', 'col-20260609-144757-ac301e', 'col-20260516-211153-138fcb', 'col-20260609-131836-2dfc0d']);
function isLatencyHiddenForCurrentCollection() {
  if (LATENCY_HIDDEN_COLLECTIONS.has(STATE.selectedCollectionId)) return true;
  // Auto-hide: ถ้า collection ถูก grade ด้วย F/C/H แล้ว (มี grader content แต่ไม่มี latency grader)
  // ถือว่าตัด latency ออกจากการวิเคราะห์
  const res = (STATE.selectedCollection && STATE.selectedCollection.effective && STATE.selectedCollection.effective.results) || [];
  if (!res.length) return false;
  let hasContent = false, hasLatency = false;
  for (const r of res) for (const g of (r.graders || [])) {
    const base = (g.metric || '').replace(/_(turn_)?t?\d+$/, '').replace(/_turn_\d+$/, '');
    if (base === 'response_latency') hasLatency = true;
    else if (['faithfulness','correctness','hallucination'].includes(base)) hasContent = true;
  }
  return hasContent && !hasLatency;
}
function isLatencyMetric(metric) {
  return (metric || '').replace(/_(turn_)?t?\d+$/, '').replace(/_turn_\d+$/, '') === 'response_latency';
}

// นับว่าแต่ละมิติ (latency, faithfulness, correctness, hallucination) ผ่านกี่เคส + คิด verdict รวม
function evaluateCriteria(results) {
  const total = results.length;
  const passed = results.filter(r => r.status === 'PASS').length;
  const passRate = total ? (passed / total * 100) : 0;

  // Per-dimension stats (from AI remark / graders)
  const stats = {
    latency:       {ok: 0, total: 0},
    faithfulness:  {ok: 0, total: 0},
    correctness:   {ok: 0, total: 0},
    hallucination: {ok: 0, total: 0},
  };
  results.forEach(r => {
    const graders = r.graders || [];
    graders.forEach(g => {
      // Skip N/A placeholder entries — เป็น "ไม่ได้วัด" ไม่ใช่ "วัดแล้วไม่ผ่าน"
      if (g.result === 'N/A') return;

      if (g.metric === 'response_latency') {
        stats.latency.total += 1;
        if (g.result === 'PASS') stats.latency.ok += 1;
      } else {
        // Accept both plain (faithfulness) and per-turn (faithfulness_turn_1, faithfulness_t1) metrics
        const base = (g.metric || '').replace(/_(turn_)?t?\d+$/, '').replace(/_turn_\d+$/, '');
        if (['faithfulness','correctness','hallucination'].includes(base)) {
          stats[base].total += 1;
          if (g.score != null && g.score >= CRITERIA.minLLMScore) stats[base].ok += 1;
        }
      }
    });
  });

  const verdict = passRate >= CRITERIA.passRate ? 'pass' : 'fail';
  return {passRate, passed, total, stats, verdict};
}

// คำนวณระดับตาม % : >=80 = pass(เขียว), 60-79 = near(เหลือง), <60 = fail(แดง)
function gradeByPercent(percentage) {
  if (percentage >= CRITERIA.passRate) return {level: 'pass', color: '#10b981', icon: '✓'};
  if (percentage >= CRITERIA.nearThreshold) return {level: 'near', color: '#d97706', icon: '!'};
  return {level: 'fail', color: '#ef4444', icon: '✗'};
}

// Render card "🎯 ผลตามเกณฑ์" — verdict + ตารางเกณฑ์แต่ละมิติ
// ใช้ 3-level grading: เขียว (≥80%), เหลือง (60-79%), แดง (<60%)
function renderCriteriaVerdict(results) {
  const ev = evaluateCriteria(results);
  const verdictGrade = gradeByPercent(ev.passRate);
  const verdictBgMap = {pass: '#d1fae5', near: '#fef3c7', fail: '#fee2e2'};
  const verdictLabelMap = {pass: '🟢 ผ่านเกณฑ์', near: '🟡 ใกล้เกณฑ์', fail: '🔴 ไม่ผ่านเกณฑ์'};
  const verdictColor = verdictGrade.color;
  const verdictBg = verdictBgMap[verdictGrade.level];
  const verdictLabel = verdictLabelMap[verdictGrade.level];
  const verdictText = verdictGrade.level === 'pass'
    ? `Pass rate ${ev.passRate.toFixed(1)}% ≥ เกณฑ์ ${CRITERIA.passRate}%`
    : (verdictGrade.level === 'near'
        ? `Pass rate ${ev.passRate.toFixed(1)}% (ต่ำกว่า ${CRITERIA.passRate}% แต่ยังถึง ${CRITERIA.nearThreshold}%)`
        : `Pass rate ${ev.passRate.toFixed(1)}% ต่ำกว่าเกณฑ์ ${CRITERIA.passRate}%`);

  // แปลง stats เป็น percentage แล้ว grade ด้วย gradeByPercent
  const statPct = (s) => s.total > 0 ? (s.ok / s.total * 100) : 0;
  // metric ที่ไม่มีข้อมูล (total = 0) ถือว่า "ไม่ทดสอบ" — แสดงเทา ไม่นับ verdict
  const rows = [
    {key: 'Pass Rate',        pct: ev.passRate,                need: `≥ ${CRITERIA.passRate}%`, cur: ev.passRate.toFixed(1) + '%', skipped: false},
    {key: 'Latency',          pct: statPct(ev.stats.latency),        need: `≥ ${CRITERIA.passRate}%`, cur: pct(ev.stats.latency),       skipped: ev.stats.latency.total === 0, hide: isLatencyHiddenForCurrentCollection()},
    {key: 'Faithfulness ≥4',  pct: statPct(ev.stats.faithfulness),   need: `≥ ${CRITERIA.passRate}%`, cur: pct(ev.stats.faithfulness),  skipped: ev.stats.faithfulness.total === 0},
    {key: 'Correctness ≥4',   pct: statPct(ev.stats.correctness),    need: `≥ ${CRITERIA.passRate}%`, cur: pct(ev.stats.correctness),   skipped: ev.stats.correctness.total === 0},
    {key: 'Hallucination ≥4', pct: statPct(ev.stats.hallucination),  need: `≥ ${CRITERIA.passRate}%`, cur: pct(ev.stats.hallucination), skipped: ev.stats.hallucination.total === 0},
  ].filter(row => !row.hide);

  let html = `<div style="background:${verdictBg};padding:18px 22px;border-radius:10px;border-left:6px solid ${verdictColor}">
    <div style="font-size:18px;font-weight:800;color:${verdictColor}">${verdictLabel}</div>
    <div style="font-size:13px;color:#4b5563;margin-top:6px">${esc(verdictText)}</div>
    <div style="margin-top:12px;background:#fff;border-radius:8px;padding:12px 14px">`;
  rows.forEach(row => {
    const grade = row.skipped
      ? {color: '#9ca3af', icon: '–'}
      : gradeByPercent(row.pct);
    const needText = row.skipped ? 'ไม่ทดสอบ' : `เกณฑ์ ${row.need}`;
    html += `<div style="display:flex;align-items:center;gap:10px;padding:7px 0;font-size:13px;border-bottom:1px solid #f3f4f6">
      <span style="width:20px;font-size:14px;font-weight:700;color:${grade.color}">${grade.icon}</span>
      <span style="flex:1;font-weight:600;color:#1a1a2e">${esc(row.key)}</span>
      <span style="width:100px;text-align:right;color:${grade.color};font-weight:700;font-size:14px">${esc(row.cur)}</span>
      <span style="width:90px;text-align:right;color:#9ca3af;font-size:11px">${esc(needText)}</span>
    </div>`;
  });
  html += `</div></div>`;
  return html;
}

// Format ratio เป็น "NN.N% (ok/total)"
function pct(stat) {
  if (!stat.total) return '—';
  return `${(stat.ok / stat.total * 100).toFixed(1)}% (${stat.ok}/${stat.total})`;
}

// ============================================================
// 5. CASES TO RETURN (ตีกลับ) — จัดกลุ่มเคส FAIL เพื่อส่งต่อ
// ============================================================
// 4 กลุ่ม: reopen (status=REOPEN) / infra (Avatar timeout/no transcript) / latencyOnly / content
function categorizeForReturn(results) {
  const reopen = [];       // status=REOPEN — QA ตีกลับให้ retest
  const infra = [];        // รันใหม่ (timeout / no transcript)
  const latencyOnly = [];  // latency เกิน, content ผ่าน → performance issue
  const content = [];      // content grader FAIL — ส่ง dev
  results.forEach(r => {
    if (r.status === 'REOPEN') { reopen.push(r); return; }
    if (r.status !== 'FAIL') return;
    const cls = classifyResult(r);
    if (cls === 'timeout' || cls === 'no_response') infra.push(r);
    else if (cls === 'latency_only') latencyOnly.push(r);
    else content.push(r);  // content, mixed_fail, other_fail
  });
  return {reopen, infra, latencyOnly, content};
}

// ตัด prefix ออกจาก test_id เต็ม (เช่น KAEW-RAG-C028 → C028) — ใช้ใน pytest -k "or C028..."
function shortTestIdFromFull(tid) {
  const m = (tid || '').match(/([A-Z]+\d+)$/);
  return m ? m[1] : tid;
}

// Render card "📮 เคสที่ต้องตีกลับ" — 3 กลุ่ม พร้อมปุ่ม copy list / copy pytest cmd

  const groupDefs = [
    {
      key: 'reopen',
      title: '🔁 REOPEN — QA ตีกลับให้ retest',
      color: '#db2777',
      bg: '#fdf2f8',
      hint: 'เคสที่ QA mark REOPEN explicitly — ต้องรันใหม่ (อาจมาจาก infra/grading review)',
      showSummaryPromptBtn: true,
      summaryField: 'reopen_summary_bullets',
      items: groups.reopen,
    },
    {
      key: 'infra',
      title: '🔴 Infra — ให้ QA รันใหม่',
      color: '#dc2626',
      bg: '#fef2f2',
      hint: 'Avatar Timeout / ไม่มี transcript — ยังไม่ได้พิสูจน์ว่า Avatar ผิด',
      showSummaryPromptBtn: true,
      summaryField: 'infra_summary_bullets',
      items: groups.infra,
    },
    {
      key: 'latencyOnly',
      title: '🟡 Performance — Latency เกินเกณฑ์',
      color: '#d97706',
      bg: '#fffbeb',
      hint: 'เนื้อหาผ่านเกณฑ์ (F/C/H ≥ 4/5) แต่ Avatar ตอบช้ากว่า threshold',
      showSummaryPromptBtn: true,
      summaryField: 'latency_summary_bullets',
      items: groups.latencyOnly,
    },
    {
      key: 'content',
      title: '⚫ Content — ต้องตรวจสอบก่อนปิดเคส',
      color: '#374151',
      bg: '#f3f4f6',
      hint: 'คะแนน Faithfulness / Correctness / Hallucination ต่ำกว่า 4/5',
      showSummaryPromptBtn: true,
      summaryField: 'content_summary_bullets',
      items: groups.content,
    },
  ];

  // Pull collection metadata for rerun command (collection_id + kiosk_id + preset)
  const col = (STATE.selectedCollection && STATE.selectedCollection.collection) || {};
  const colUrl = col.collection_url || '';
  const presetUrl = col.preset_url || '';
  const collectionId = extractIdFromUrl(colUrl, '/collections') || col.id || '';
  const kioskId = extractIdFromUrl(presetUrl, '/presets?');
  const proj = STATE.currentProject;
  const rc = (proj && proj.run_cmd) || {};
  const allPresets = rc.presets || [];
  const allTypes = rc.types || ['crawl', 'walk', 'run', 'manual'];
  const pytestBin = resolvePytestBin(proj);
  const guessedPreset = guessPresetFromRuns((STATE.selectedCollection && STATE.selectedCollection.runs) || [], allPresets);
  const inferredType = inferCollectionType(col);
  const rerunPreset = col.preset || guessedPreset || allPresets[0] || '';
  const rerunType = allTypes.includes(inferredType) ? inferredType : (allTypes[0] || 'walk');

  // Map prefix อักษรท้าย shortId → test file type
  // (C = crawl, W = walk, R = run, M = manual)
  const PREFIX_TO_TYPE = { C: 'crawl', W: 'walk', R: 'run', M: 'manual' };
  const typeOfShortId = (sid) => {
    const m = (sid || '').match(/^([CWRM])/i);
    return m ? PREFIX_TO_TYPE[m[1].toUpperCase()] : '';
  };

  groupDefs.forEach(g => {
    if (!g.items.length) return;
    const ids = g.items.map(r => r.test_id);  // full test_ids only (per GRADING_GUIDE 6.1)

    // Group short ids ตาม test type (C/W/R/M) — เคสที่ resolve ไม่ได้ ไป "unknown"
    const byType = {};
    shortIds.forEach(sid => {
      const t = typeOfShortId(sid) || rerunType || 'unknown';
      (byType[t] = byType[t] || []).push(sid);
    });

    // สร้าง 1 คำสั่งต่อ 1 test type ใน group นี้
    const envLines = [];
    if (collectionId) envLines.push(`TEST_COLLECTION_ID=${collectionId}`);
    if (kioskId) envLines.push(`KIOSK_PRESET_ID=${kioskId}`);
    const envBlock = envLines.join(' \\\n  ');

    const collapsible = g.key !== 'infra' && g.key !== 'reopen';

      } else {

      const safeCmd = esc(cmd).replace(/'/g, "&#39;");

      const preBlock = `<pre style="background:#111827;color:#e5e7eb;padding:8px 10px;border-radius:4px;font-size:11px;overflow-x:auto;margin:6px 0 0 0;white-space:pre-wrap;word-break:break-all">${esc(cmd)}</pre>`;

      </div>`;
      if (collapsible) {
        return `<details style="margin-top:8px;background:#fff;border:1px solid ${g.color}33;border-radius:6px;padding:8px 10px">
          <summary style="cursor:pointer;list-style:none;outline:none">${header}<div style="font-size:10px;color:#9ca3af;margin-top:2px">▾ คลิกเพื่อดูคำสั่ง</div></summary>
          ${preBlock}
        </details>`;
      }
      return `<div style="margin-top:8px;background:#fff;border:1px solid ${g.color}33;border-radius:6px;padding:8px 10px">
        ${header}
        ${preBlock}
      </div>`;
    }).join('');

    html += `<div style="background:${g.bg};padding:14px 16px;border-radius:8px;border-left:4px solid ${g.color}">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:6px;flex-wrap:wrap">
        <span style="font-weight:700;color:${g.color};flex:1;min-width:200px;font-size:14px">${esc(g.title)} <span style="color:${g.color};font-weight:800;font-size:16px">(${ids.length})</span></span>
        ${summaryBtn}
      </div>
      ${hintHtml}
      <div id="ret_${g.key}" data-ids="${esc(ids.join(','))}" data-shorts="${esc(shortIds.join(','))}" style="font-family:monospace;font-size:12px;color:${g.color};word-break:break-word;line-height:1.6">${esc(listStr)}</div>
      ${cmdBoxes}
    </div>`;
  });

  html += '</div></div>';  // close grid + card wrapper
  return html;
}

// Copy prompt สั่ง Claude วิเคราะห์เคสใน group ที่เลือก (infra / latencyOnly / content)
// แล้วเขียน bullets ลงไฟล์ collection ใน field ที่กำหนด
async function copyGroupSummaryPrompt(groupKey, summaryField, groupTitle) {
  const col = STATE.selectedCollection && STATE.selectedCollection.collection;
  const eff = STATE.selectedCollection && STATE.selectedCollection.effective;
  if (!col || !eff) { alert('ไม่พบ collection / effective results'); return; }

  // Use same categorization as the render — read IDs ออกจาก dataset ของ ret_<key>
  const el = document.getElementById('ret_' + groupKey);
  if (!el) { alert('ไม่พบ group: ' + groupKey); return; }
  const ids = (el.dataset.ids || '').split(',').filter(Boolean);
  if (!ids.length) { alert('ไม่มีเคสใน group นี้'); return; }

  const byId = {};
  eff.results.forEach(r => { byId[r.test_id] = r; });

  const hideLat = isLatencyHiddenForCurrentCollection();
  const blocks = ids.map(tid => {
    const r = byId[tid];
    if (!r) return `=== ${tid} ===\n(ไม่พบข้อมูล)`;
    const scores = (r.graders || [])
      .filter(g => ['faithfulness','correctness','hallucination'].includes((g.metric || '').replace(/_(turn_)?t?\d+$/, '').replace(/_turn_\d+$/, '')))
      .map(g => g.result === 'N/A' ? `${g.metric}=N/A(ไม่ได้วัด)` : `${g.metric}=${g.score}`)
      .join(', ');
    const latG = (r.graders || []).find(g => g.metric === 'response_latency');
    const lines = [
      `=== ${tid} ===`,
      `scenario: ${r.scenario || ''}`,
      `user_input: ${r.user_input || ''}`,
      `user_transcript (STT): ${r.user_transcript || ''}`,
      `avatar_response: ${(r.avatar_response || '').slice(0, 500)}`,
    ];
    if (!hideLat) {
      lines.push(`latency_ms: ${Math.round(r.latency_ms || 0)}${latG ? ` (${latG.result})` : ''}`);
    }
    lines.push(
      `scores: ${scores || '(no LLM score)'}`,
      `ai_remark: ${r.ai_remark || '(none)'}`,
      `reason: ${(r.reason || '').slice(0, 200)}`,
    );
    return lines.join('\n');
  }).join('\n\n');

  const colPath = `tests/kiosk-avatar/results/collections/${col.id}.json`;

// Overall-summary card: สรุป verdict โดยรวมของรอบนี้ (ทุกเคส ไม่แยก group)
// ใช้ field `overall_summary_bullets` ใน collection JSON
function renderOverallSummary() {
  const col = STATE.selectedCollection && STATE.selectedCollection.collection;
  const eff = STATE.selectedCollection && STATE.selectedCollection.effective;
  if (!col || !eff) return '';
  const bullets = col.overall_summary_bullets || [];
  const fallback = '(ยังไม่มีสรุป — กดปุ่ม "🤖 Copy prompt สรุปรวม" แล้ววาง Claude เพื่อให้สร้างสรุปภาพรวม)';
  let bulletsHtml = '';
  if (bullets.length) {
    // Parse into sections by header bullet.
    // Header = any bullet starting with "<emoji/space> [TAG]" where TAG is in square brackets.
    //   e.g. "📊 [VERDICT] ...", "🧑‍💻 [DEV — Backend/Infra] ให้แก้ 3 เรื่อง:", "🎯 [NEXT STEP] ..."
    // Empty string "" = explicit section break (also splits).
    const HEADER_RE = /^\s*\S+\s*\[[^\]]+\]/;
    const sections = [];
    let cur = { header: null, items: [] };
    const pushCur = () => { if (cur.header || cur.items.length) sections.push(cur); cur = { header: null, items: [] }; };
    bullets.forEach(b => {
      if (b === '' || b == null) { pushCur(); return; }
      if (HEADER_RE.test(b)) { pushCur(); cur = { header: b, items: [] }; return; }
      cur.items.push(b);
    });
    pushCur();

    // Render rules:
    //  - Header WITH items → collapsible-style header box + bullet list beneath (Dev/AI Eng/QA sections)
    //  - Header WITHOUT items → info row (standalone verdict/scope/next-step line)
    const parts = sections.map(s => {
      let out = '';
      if (s.header && s.items.length === 0) {
        // Standalone line (e.g. 📊 [VERDICT] ..., 🎯 [NEXT STEP] ...)
        out += `<div style="margin:8px 0;padding:8px 12px;background:#eef2ff;border-left:3px solid #6366f1;border-radius:4px;color:#1f2937;line-height:1.6;font-size:13px">${esc(s.header)}</div>`;
      } else if (s.header) {
        out += `<div style="font-weight:700;color:#1a1a2e;margin:14px 0 6px 0;font-size:13px;padding:6px 10px;background:#f3f4f6;border-radius:6px">${esc(s.header)}</div>`;
        out += `<ul style="margin:4px 0 0 20px;padding:0;color:#1f2937;line-height:1.7">`
          + s.items.map(i => `<li style="margin-bottom:6px">${esc(i)}</li>`).join('')
          + `</ul>`;
      } else if (s.items.length) {
        out += `<ul style="margin:4px 0 0 20px;padding:0;color:#1f2937;line-height:1.7">`
          + s.items.map(i => `<li style="margin-bottom:6px">${esc(i)}</li>`).join('')
          + `</ul>`;
      }
      return out;
    });
    bulletsHtml = parts.join('');
  } else {
    bulletsHtml = `<div style="color:#6b7280;font-style:italic;font-size:13px;margin-top:8px">${esc(fallback)}</div>`;
  }
  return `<div style="background:#fff;padding:18px 22px;border-radius:10px;margin-bottom:16px;box-shadow:0 1px 3px rgba(0,0,0,.06);border-left:6px solid #6366f1">
    <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
      <div style="font-size:15px;font-weight:700;color:#1a1a2e;flex:1;min-width:200px">📝 สรุปผลการรันครั้งนี้</div>
      <button class="btn btn-ghost btn-sm" onclick="copyOverallSummaryPrompt()" title="Copy prompt สั่ง Claude สร้างสรุปภาพรวมของ collection นี้">🤖 Copy prompt สรุปรวม</button>
    </div>
    ${bulletsHtml}
  </div>`;
}

// ============================================================
// 7. COLLECTION TYPE — infer type จาก run_ids ใน collection
// ============================================================
// Returns: 'empty' | 'crawl' | 'walk' | 'run' | 'manual' | 'mixed'
// ใช้แสดง badge ใน collection list + filter ประเภท
function inferCollectionType(collection) {
  // ค่า manual จาก modal มี priority สูงสุด
  if (collection.type) return collection.type;
  const rids = collection.run_ids || [];
  if (!rids.length) return 'empty';
  const kinds = new Set();
  rids.forEach(rid => {
    const id = (rid || '').toLowerCase();
    if (id.includes('-manual-')) kinds.add('manual');
    else if (id.includes('-walk-')) kinds.add('walk');
    else if (id.includes('-run-')) kinds.add('run');
    else kinds.add('crawl');  // default (includes -fast-, -crawl-)
  });
  if (kinds.size > 1) return 'mixed';
  return [...kinds][0];
}

// Shorten run label สำหรับแสดง dropdown:
// "kaew-rag-fast-20260423-020308-48bbb6" → "kaew-rag-fast-20260423-02:03:08"
function shortenRunId(runId) {
  const m = (runId || '').match(/^(.+?-)(\d{8})-(\d{6})(-[a-f0-9]+)?$/);
  if (!m) return runId;
  const prefix = m[1].replace(/-$/, '');
  const date = m[2];
  const time = m[3];
  const hh = time.slice(0,2), mm = time.slice(2,4), ss = time.slice(4,6);
  return `${prefix}-${date}-${hh}:${mm}:${ss}`;
}

// ============================================================
// 8. URL ROUTING — client-side routing (SPA)
// ============================================================
// URL patterns:
//   /                                      → project[0] / runs
//   /<pid>/runs                            → project, runs view
//   /<pid>/runs?<run-id>                   → select run
//   /<pid>/collections                     → collections view
//   /<pid>/collections/<cid>               → select collection (effective tab)
//   /<pid>/collections/<cid>?<run-id>      → collection sub-tab = that run
// หลัก: path บอก "อยู่หน้าไหน", query string (key-less) บอก "เลือก id ไหน"

// แปลง URL ปัจจุบัน → object {pid, section, id1, query, params}
// `query` = legacy single-value (run id หรือ subTab เก่า เช่น "?runs", "?kaew-rag-fast-...")
// `params` = URLSearchParams (?subTab=runs&runInstr=summary) สำหรับ multi-key
function parseUrl() {
  const parts = window.location.pathname.split('/').filter(Boolean);
  const [pid, section, id1] = parts;
  const raw = window.location.search.startsWith('?') ? window.location.search.slice(1) : '';
  // Legacy: ถ้า query ไม่มี "=" และไม่มี "&" → key-less value (เก่า)
  const isLegacy = raw && !raw.includes('=') && !raw.includes('&');
  const query = isLegacy ? decodeURIComponent(raw) : '';
  const params = isLegacy ? new URLSearchParams() : new URLSearchParams(raw);
  return {pid, section, id1, query, params};
}

// สร้าง URL ตาม STATE ปัจจุบัน — ใช้ก่อน push/replace
function buildUrl() {
  const pid = STATE.currentProject?.id;
  if (!pid) return '/';
  if (STATE.mainTab === 'runs') {
    const base = `/${pid}/runs`;
    return STATE.selectedRunId ? `${base}?${encodeURIComponent(STATE.selectedRunId)}` : base;
  }
  if (STATE.mainTab === 'collections') {
    if (STATE.selectedCollectionId) {
      const base = `/${pid}/collections/${encodeURIComponent(STATE.selectedCollectionId)}`;
      const params = new URLSearchParams();
      if (STATE.collectionSubTab && STATE.collectionSubTab !== 'effective') {
        params.set('subTab', STATE.collectionSubTab);
      }
      const runInstr = (STATE._runInstrTab || {})[STATE.selectedCollectionId];
      if (runInstr && runInstr !== 'run') {
        params.set('runInstr', runInstr);
      }
      const qs = params.toString();
      return qs ? `${base}?${qs}` : base;
    }
    return `/${pid}/collections`;
  }
  return `/${pid}`;
}

// Push/replace URL ให้ตรงกับ STATE — เรียกหลัง state transition ทุกครั้ง
function syncUrl(replace = false) {
  const url = buildUrl();
  const current = window.location.pathname + window.location.search;
  if (current === url) return;
  if (replace) history.replaceState(null, '', url);
  else history.pushState(null, '', url);
}

// Browser back/forward → sync state กลับตาม URL
window.addEventListener('popstate', () => {
  applyUrlToState(parseUrl()).then(() => render());
});

// เอา parsed URL ไป apply ลง STATE + load data ที่ต้องการ
async function applyUrlToState(parsed) {
  // Project
  if (parsed.pid) {
    const proj = STATE.projects.find(p => p.id === parsed.pid);
    if (proj && proj !== STATE.currentProject) {
      STATE.currentProject = proj;
      STATE.selectedRunId = null;
      STATE.selectedRunDetail = null;
      STATE.selectedCollectionId = null;
      STATE.selectedCollection = null;
      await loadRuns();
      await loadCollections();
    }
  }
  if (!STATE.currentProject && STATE.projects.length) {
    STATE.currentProject = STATE.projects[0];
    await loadRuns();
    await loadCollections();
  }
  renderProjectMenu();

  // Section / main tab — collections เป็น default เมื่อ URL ไม่ระบุ section
  if (parsed.section === 'runs') {
    STATE.mainTab = 'runs';
    if (parsed.query) {
      STATE.selectedRunId = parsed.query;
      STATE.selectedRunDetail = null;
    }
  } else {
    STATE.mainTab = 'collections';
    if (parsed.section === 'collections' && parsed.id1) {
      STATE.selectedCollectionId = parsed.id1;
      STATE.selectedCollection = null;
      // subTab: รองรับทั้ง legacy (?runs/?jira) และใหม่ (?subTab=runs)
      STATE.collectionSubTab = parsed.params.get('subTab') || parsed.query || 'effective';
      // runInstr tab: เก็บใน STATE._runInstrTab[cid]
      const runInstr = parsed.params.get('runInstr');
      if (runInstr) {
        STATE._runInstrTab = STATE._runInstrTab || {};
        STATE._runInstrTab[parsed.id1] = runInstr;
      }
    }
  }

  document.getElementById('tabRuns').classList.toggle('active', STATE.mainTab === 'runs');
  document.getElementById('tabCols').classList.toggle('active', STATE.mainTab === 'collections');
  document.getElementById('tabJira').classList.toggle('active', STATE.mainTab === 'jira');
  document.getElementById('viewRuns').style.display = STATE.mainTab === 'runs' ? '' : 'none';
  document.getElementById('viewCollections').style.display = STATE.mainTab === 'collections' ? '' : 'none';
  document.getElementById('viewJira').style.display = STATE.mainTab === 'jira' ? '' : 'none';
}

// ============================================================
// 9. INIT + API LOADERS — bootstrap + โหลดข้อมูลจาก server
// ============================================================

// Entry point: โหลด projects → apply URL → render
async function init() {
  const res = await api.get('/api/projects');
  STATE.repoRoot = res.repo_root || '';
  STATE.projects = res.projects || [];
  if (!STATE.projects.length) {
    document.getElementById('statusBar').textContent = 'no projects configured';
    return;
  }
  renderProjectMenu();
  await applyUrlToState(parseUrl());
  syncUrl(true);  // normalize URL (e.g. / → /<pid>/runs)
  render();
}

// Render project menu (aside) — ปุ่ม 1 อันต่อ project, highlight ตัวที่เลือก
function renderProjectMenu() {
  const nav = document.getElementById('projectMenu');
  if (!nav) return;
  nav.innerHTML = '';
  STATE.projects.forEach(p => {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.textContent = p.name;
    btn.dataset.pid = p.id;
    if (STATE.currentProject && p.id === STATE.currentProject.id) btn.classList.add('active');
    btn.onclick = () => onProjectChange(p.id);
    nav.appendChild(btn);
  });
}

// เปลี่ยน project → reset state + โหลด runs/collections ใหม่
async function onProjectChange(pid) {
  if (STATE.currentProject && pid === STATE.currentProject.id) return;
  STATE.currentProject = STATE.projects.find(p => p.id === pid);
  STATE.selectedRunId = null;
  STATE.selectedRunDetail = null;
  STATE.selectedCollectionId = null;
  STATE.selectedCollection = null;
  renderProjectMenu();
  await loadRuns();
  await loadCollections();
  syncUrl();
  render();
}

// ดึง list runs ของ project + auto-select run ล่าสุด + preset date filter
async function loadRuns() {
  const pid = STATE.currentProject.id;
  const res = await api.get(`/api/projects/${pid}/runs`);
  STATE.runs = res.runs || [];
  if (STATE.runs.length && !STATE.selectedRunId) {
    STATE.selectedRunId = STATE.runs[0].run_id;
    // Preset date filter to the latest run's date
    const k = runDateKey(STATE.runs[0]);
    if (k) STATE.dateFilter = {y: k.slice(0,4), m: k.slice(5,7), d: k.slice(8,10)};
  }
}

// ดึงรายละเอียด run (รวม results[] + meta) — lazy load เมื่อเลือก run
async function loadRunDetail(runId) {
  const pid = STATE.currentProject.id;
  const res = await api.get(`/api/projects/${pid}/runs/${encodeURIComponent(runId)}`);
  STATE.selectedRunDetail = res;
  STATE.selectedRunId = runId;
}

// ดึง list collections ของ project (ไม่ auto-select — ต้องกด card ก่อน)
async function loadCollections() {
  const pid = STATE.currentProject.id;
  const res = await api.get(`/api/projects/${pid}/collections`);
  STATE.collections = res.collections || [];
  // Do NOT auto-select — let user click to open a collection
  if (STATE.selectedCollectionId && !STATE.collections.some(c => c.id === STATE.selectedCollectionId)) {
    STATE.selectedCollectionId = null;
  }
}

// ดึงรายละเอียด collection (hydrated: รวม runs[] + effective + meta)
async function loadCollectionDetail(cid) {
  const pid = STATE.currentProject.id;
  const res = await api.get(`/api/projects/${pid}/collections/${encodeURIComponent(cid)}`);
  STATE.selectedCollection = res;
  STATE.selectedCollectionId = cid;
  // หมายเหตุ: ห้าม reset collectionSubTab ตรงนี้ — ค่าเดิมอาจมาจาก URL (?runs/?jira)
  // caller (applyUrlToState, submitCreateCollection ฯลฯ) เป็นคนตั้ง subTab ก่อนเรียกฟังก์ชันนี้
  STATE.selectedCollectionJira = null;
  loadCollectionJira(cid);
}

async function loadCollectionJira(cid, fresh = false) {
  const pid = STATE.currentProject.id;
  const qs = fresh ? '?fresh=1' : '';
  try {
    const res = await api.get(`/api/projects/${pid}/collections/${encodeURIComponent(cid)}/jira-issues${qs}`);
    // Guard: user may have switched collection while fetching
    if (STATE.selectedCollectionId === cid) {
      res._fetched_at = Date.now();
      STATE.selectedCollectionJira = res;
      STATE.selectedCollectionJiraLoading = false;
      render();
    }
  } catch (e) {
    if (STATE.selectedCollectionId === cid) {
      STATE.selectedCollectionJira = {configured: false, issues: [], error: String(e), _fetched_at: Date.now()};
      STATE.selectedCollectionJiraLoading = false;
      render();
    }
  }
}

async function refreshCollectionJira() {
  const cid = STATE.selectedCollectionId;
  if (!cid) return;
  STATE.selectedCollectionJiraLoading = true;
  render();
  await loadCollectionJira(cid, true);  // fresh=1 bypass server cache
}

  document.getElementById('viewCollections').style.display = t === 'collections' ? '' : 'none';

// ============================================================
// 12. RUNS VIEW — หน้าดูผลการรัน (แต่ละ run แยกกัน)
// ============================================================
// Layout: [Date filter] [Run dropdown] [Re-run FAIL btn] → summary → filter → table
async function renderRuns() {
  const root = document.getElementById('viewRuns');
  if (!STATE.runs.length) {
    root.innerHTML = '<div class="empty">ยังไม่มีผลการรันสำหรับ project นี้</div>';
    return;
  }

  // Available date parts (only values that exist in data, honoring progressive filters)
  const df = STATE.dateFilter;
  const allDates = STATE.runs.map(runDateKey).filter(Boolean);  // YYYY-MM-DD
  const parts = allDates.map(d => ({y: d.slice(0,4), m: d.slice(5,7), d: d.slice(8,10), full: d}));

  const years = [...new Set(parts.map(p => p.y))].sort().reverse();
  const months = [...new Set(parts.filter(p => !df.y || p.y === df.y).map(p => p.m))].sort();
  const days = [...new Set(parts.filter(p => (!df.y || p.y === df.y) && (!df.m || p.m === df.m)).map(p => p.d))].sort();

  // Filter runs by y/m/d + free-text search on run_id
  const search = (STATE.runSearch || '').trim().toLowerCase();
  const filteredRuns = STATE.runs.filter(r => {
    const k = runDateKey(r);
    if (k) {
      const [y, m, d] = [k.slice(0,4), k.slice(5,7), k.slice(8,10)];
      if (df.y && y !== df.y) return false;
      if (df.m && m !== df.m) return false;
      if (df.d && d !== df.d) return false;
    } else if (df.y || df.m || df.d) {
      return false;
    }
    if (search) {
      const hay = (r.run_id || '').toLowerCase();
      if (!hay.includes(search)) return false;
    }
    return true;
  });

  // If current selected run is filtered out, switch to first visible (don't push URL)
  if (filteredRuns.length && !filteredRuns.some(r => r.run_id === STATE.selectedRunId)) {
    STATE.selectedRunId = filteredRuns[0].run_id;
    STATE.selectedRunDetail = null;
  }

  // Ensure we have detail loaded for selected
  if (STATE.selectedRunId && (!STATE.selectedRunDetail || STATE.selectedRunDetail.run.run_id !== STATE.selectedRunId)) {
    await loadRunDetail(STATE.selectedRunId);
  }

  // Date + Run selector toolbar
  let html = `<div class="toolbar">
    <label>Date:</label>
    <select class="sel-sm sel-year" onchange="selectDatePart('y', this.value)">
      <option value="" ${df.y===''?'selected':''}>— ปี —</option>
      ${years.map(y => `<option value="${esc(y)}" ${df.y===y?'selected':''}>${esc(y)}</option>`).join('')}
    </select>
    <select class="sel-sm sel-mon" onchange="selectDatePart('m', this.value)">
      <option value="" ${df.m===''?'selected':''}>— เดือน —</option>
      ${months.map(m => `<option value="${esc(m)}" ${df.m===m?'selected':''}>${esc(m)}</option>`).join('')}
    </select>
    <select class="sel-sm sel-day" onchange="selectDatePart('d', this.value)">
      <option value="" ${df.d===''?'selected':''}>— วัน —</option>
      ${days.map(d => `<option value="${esc(d)}" ${df.d===d?'selected':''}>${esc(d)}</option>`).join('')}
    </select>
    ${(df.y||df.m||df.d) ? `<button class="btn btn-ghost btn-sm" onclick="clearDateFilter()">ล้าง</button>` : ''}
    <label>Search:</label>
    <input type="text" id="runSearchInput" placeholder="ค้นหา run id..." value="${esc(STATE.runSearch || '')}" oninput="onRunSearchInput(this.value)" style="padding:4px 8px;border:1px solid #d1d5db;border-radius:4px;font-size:13px;min-width:180px" />
    ${STATE.runSearch ? `<button class="btn btn-ghost btn-sm" onclick="clearRunSearch()" title="ล้างคำค้นหา">✕</button>` : ''}
    <label>Run (${filteredRuns.length}):</label>
    <select onchange="selectRun(this.value)">
      ${filteredRuns.map(r => {
        const rate = r.total > 0 ? Math.round(r.passed / r.total * 100) : 0;
        const selected = r.run_id === STATE.selectedRunId ? 'selected' : '';
        return `<option value="${esc(r.run_id)}" ${selected}>${esc(shortenRunId(r.run_id))} — ${r.passed}/${r.total} (${rate}%)</option>`;
      }).join('')}
    </select>
    <button class="btn btn-ghost btn-sm" onclick="copyRunLabel()" title="Copy URL + label ของ run นี้ (ใช้ส่งให้ Claude Code grade)">📋 Copy Run</button>
    <button class="btn btn-ghost btn-sm" onclick="deleteCurrentRun()" title="ลบ run ที่กำลังดูอยู่ (ลบไฟล์ result_*.json จริง)" style="color:#ef4444">🗑️ ลบ Run นี้</button>
  </div>`;

  if (!filteredRuns.length) {
    html += '<div class="empty">ไม่มี run ในวันที่เลือก</div>';
    root.innerHTML = html;
    return;
  }

  const run = STATE.selectedRunDetail.run;
  const meta = STATE.selectedRunDetail.meta || {};
  html += renderSummaryCards(run.passed, run.failed, run.pending, run.total, run.duration_seconds, run.results);
  html += renderFilterRow();
  html += renderResultsTable(run.results, meta);
  root.innerHTML = html;
}

// Render การ์ดสรุป (Total / PASS / FAIL / Pending / Rate / Duration) + progress bar
// ─── Backoffice-specific helpers ───────────────────────────────────────
// Read case_statuses dict + test_case_paths, compute summary buckets keyed
// by case_id (NOT step rows) so admin-set statuses are the source of truth.

async function backofficeCaseSummary(col, runResults) {
  // Returns {caseIds:[], total, counts:{PENDING,PASS,FAIL,SKIP,REOPEN}, byCategory:{cat:{total,counts}}}
  // Status priority (เหมือน loadBackofficePreviewTable):
  //   1) admin saved (col.case_statuses) → 2) Playwright run result → 3) PENDING
  const paths = col.test_case_path || '';
  if (!paths) return {caseIds: [], total: 0, counts: {}, byCategory: {}};
  let rows = [];
  try {
    const url = `/api/projects/${STATE.currentProject.id}/test-cases-content?paths=${encodeURIComponent(paths)}`;
    const data = await api.get(url);
    rows = data.rows || [];
  } catch (e) {
    return {caseIds: [], total: 0, counts: {}, byCategory: {}, error: e.message || String(e)};
  }
  // group by case_id
  const byId = {};
  rows.forEach(r => {
    const id = r.id || '(no-id)';
    if (!byId[id]) byId[id] = {source_file: r.source_file, scenario: r.scenario};
  });
  const savedStatuses = col.case_statuses || {};

  // Build run-result overlay: map test_id → Playwright run status
  const runStatusMap = {};
  (runResults || []).forEach(r => {
    const tid = (r.test_id || '').trim();
    if (!tid) return;
    const s = (r.status || '').toUpperCase();
    if (s === 'PASS') runStatusMap[tid] = 'PASS';
    else if (s === 'FAIL') runStatusMap[tid] = 'FAIL';
    else if (s === 'PENDING' || s === 'SKIP') runStatusMap[tid] = (runStatusMap[tid] || 'PENDING');
  });

  const counts = {PENDING:0, PASS:0, FAIL:0, SKIP:0, REOPEN:0};
  const byCategory = {};  // {category: {total, counts}}
  Object.keys(byId).forEach(id => {
    const s = savedStatuses[id] || runStatusMap[id] || 'PENDING';
    counts[s] = (counts[s] || 0) + 1;
    // category from source_file: ".../test-cases/<menu>/<category>/file.xlsx"
    const sf = byId[id].source_file || '';
    const m = sf.match(/test-cases\/([^/]+)\/([^/]+)\//);
    const menu = m ? m[1] : 'other';      // login, member, context-switcher
    const cat = m ? m[2] : 'other';       // ui, e2e, integration
    const key = `${menu} · ${cat}`;
    if (!byCategory[key]) byCategory[key] = {total: 0, counts: {PENDING:0,PASS:0,FAIL:0,SKIP:0,REOPEN:0}};
    byCategory[key].total++;
    byCategory[key].counts[s] = (byCategory[key].counts[s] || 0) + 1;
  });
  return {caseIds: Object.keys(byId), total: Object.keys(byId).length, counts, byCategory};
}

    <div class="bar-fill" style="width:${total>0?(counts.SKIP||0)/total*100:0}%;background:linear-gradient(90deg,#9ca3af,#d1d5db)" title="SKIP"></div>

function renderBackofficeOverallSummary(summary) {
  const {byCategory, total} = summary;
  const keys = Object.keys(byCategory).sort();
  if (!keys.length) return '';
  let html = `<div style="background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:14px;margin-bottom:16px">
    <div style="font-weight:700;margin-bottom:10px;font-size:14px">📊 Summary by Module / Category</div>
    <table style="font-size:12px"><thead><tr>
      <th>Module · Category</th><th style="text-align:right">Total</th>
      <th style="text-align:right">⏳ Pending</th>
      <th style="text-align:right">✅ Pass</th>
      <th style="text-align:right">❌ Fail</th>
      <th style="text-align:right">⊘ Skip</th>
      <th style="text-align:right">🔁 Reopen</th>
      <th style="text-align:right">Pass %</th>
    </tr></thead><tbody>`;
  // Tinted body cells — สี text อ่อน + bg อ่อน ตามแต่ละ status (เห็นชัดบนพื้นขาว)
  const TINT = {
    PENDING: 'background:#fef3c7;color:#92400e;font-weight:600',
    PASS:    'background:#d1fae5;color:#065f46;font-weight:600',
    FAIL:    'background:#fee2e2;color:#991b1b;font-weight:600',
    SKIP:    'background:#f3f4f6;color:#374151;font-weight:600',
    REOPEN:  'background:#fce7f3;color:#9d174d;font-weight:600',
  };
  keys.forEach(k => {
    const g = byCategory[k];
    const pct = g.total > 0 ? Math.round((g.counts.PASS || 0) / g.total * 100) : 0;
    const tint = (s, v) => v > 0 ? `text-align:right;${TINT[s]}` : 'text-align:right;color:#d1d5db';
    html += `<tr>
      <td><b>${esc(k)}</b></td>
      <td style="text-align:right;font-weight:700">${g.total}</td>
      <td style="${tint('PENDING', g.counts.PENDING || 0)}">${g.counts.PENDING || 0}</td>
      <td style="${tint('PASS', g.counts.PASS || 0)}">${g.counts.PASS || 0}</td>
      <td style="${tint('FAIL', g.counts.FAIL || 0)}">${g.counts.FAIL || 0}</td>
      <td style="${tint('SKIP', g.counts.SKIP || 0)}">${g.counts.SKIP || 0}</td>
      <td style="${tint('REOPEN', g.counts.REOPEN || 0)}">${g.counts.REOPEN || 0}</td>
      <td style="text-align:right;font-weight:700;color:${pct>=80?'#065f46':pct>=50?'#92400e':'#991b1b'}">${pct}%</td>
    </tr>`;
  });
  html += `</tbody></table></div>`;
  return html;
}

function renderSummaryCards(p, f, pd, t, dur, results) {
  const rate = t > 0 ? Math.round(p / t * 100) : 0;
  const m = Math.floor((dur || 0) / 60), s = Math.round((dur || 0) % 60);
  const durStr = dur ? (m > 0 ? `${m}m ${s}s` : `${s}s`) : '—';
  // Compute IMPROVEMENT + REOPEN counts from results array if provided
  const improvementCount = results ? results.filter(r => r.status === 'IMPROVEMENT').length : 0;
  const reopenCount = results ? results.filter(r => r.status === 'REOPEN').length : 0;
  const passPct = t > 0 ? (p / t) * 100 : 0;
  const imprPct = t > 0 ? (improvementCount / t) * 100 : 0;
  const failPct = t > 0 ? (f / t) * 100 : 0;
  const reopenPct = t > 0 ? (reopenCount / t) * 100 : 0;
  return `
  <div class="summary">
    <div class="card"><div class="num">${t}</div><div class="lbl">Total</div></div>
    <div class="card pass"><div class="num">${p}</div><div class="lbl">Passed</div></div>
    <div class="card improvement"><div class="num">${improvementCount}</div><div class="lbl">⚠️ Improvement</div></div>
    <div class="card fail"><div class="num">${f}</div><div class="lbl">Failed</div></div>
    <div class="card reopen"><div class="num">${reopenCount}</div><div class="lbl">🔁 Reopen</div></div>
    <div class="card pending"><div class="num">${pd || 0}</div><div class="lbl">Pending</div></div>
    <div class="card rate"><div class="num">${rate}%</div><div class="lbl">Pass Rate</div></div>
    <div class="card"><div class="num">${durStr}</div><div class="lbl">Duration</div></div>
  </div>
  <div class="bar" style="display:flex;overflow:hidden">
    <div class="bar-fill" style="width:${passPct}%;background:linear-gradient(90deg,#10b981,#34d399)" title="PASS: ${p}"></div>
    <div class="bar-fill" style="width:${imprPct}%;background:linear-gradient(90deg,#3b82f6,#60a5fa)" title="IMPROVEMENT: ${improvementCount}"></div>
    <div class="bar-fill" style="width:${failPct}%;background:linear-gradient(90deg,#ef4444,#f87171)" title="FAIL: ${f}"></div>
    <div class="bar-fill" style="width:${reopenPct}%;background:linear-gradient(90deg,#db2777,#f472b6)" title="REOPEN: ${reopenCount}"></div>
  </div>
  `;
}

// Render ตารางผลลัพธ์หลัก — ใช้ทั้งใน Runs view และ Collections sub-tabs
// opts: {hideSession: bool} — true = ซ่อน session/room ใน column Test ID (ใช้ใน Effective tab)
function renderResultsTable(results, meta, runCount, opts) {
  const hideSession = !!(opts && opts.hideSession);
  const preFiltered = STATE.filter === 'all' ? results : results.filter(r => r.status === STATE.filter);
  // Sort ตาม test_id แบบ natural — รองรับ prefix (C/W/R/M) + suffix เป็นตัวเลข
  // เรียง prefix ก่อน (C → R → W → M ตามตัวอักษร) แล้วเรียงเลข
  const filtered = [...preFiltered].sort((a, b) => {
    const ax = /^(.+?)(\d+)$/.exec(a.test_id || '');
    const bx = /^(.+?)(\d+)$/.exec(b.test_id || '');
    if (!ax || !bx) return (a.test_id || '').localeCompare(b.test_id || '');
    // เทียบ prefix ก่อน (non-digit part)
    const prefixCmp = ax[1].localeCompare(bx[1]);
    if (prefixCmp !== 0) return prefixCmp;
    // prefix เดียวกัน → เทียบ number suffix
    return parseInt(ax[2], 10) - parseInt(bx[2], 10);
  });
  if (!filtered.length) return '<div class="empty">ไม่มีผลลัพธ์</div>';
  let html = `<table><thead><tr>
    <th style="min-width:160px">Test ID</th>
    <th>Scenario</th>
    <th>User Input</th>
    <th>Response vs Expected</th>
    <th>AI Remark</th>
    <th>Status</th>
  </tr></thead><tbody>`;
  filtered.forEach(r => {
    const m = (meta || {})[r.test_id] || {};
    let idHtml = `<strong>${esc(r.test_id)}</strong>`;
    if (runCount && runCount[r.test_id] > 1) {
      idHtml += `<div class="run-multi">🔁 ${runCount[r.test_id]} runs</div>`;
    }
    if (!hideSession) {
      if (r.room_name) idHtml += `<div style="font-size:9px;color:#9ca3af;margin-top:3px" title="${esc(r.room_name)}">🏷 ${esc(r.room_name)}</div>`;
      if (r.session_id) idHtml += `<div style="font-size:9px"><a href="https://uat-admin.realfact.tech/avatar/sessions/${esc(r.session_id)}" target="_blank" style="color:#6366f1;text-decoration:none">📋 session</a></div>`;
    }

    // Detect multi-turn: มี turn_latencies หลายค่า หรือ avatar_response/user_input split ด้วย ' → ' ได้หลาย part
    // ใช้ user_input/turn_latencies เป็น source of truth สำหรับจำนวน turn — ถ้า avatar_response มีน้อยกว่า แปลว่า turn ที่ขาดไม่มี response (sync fail/error)
    const turnLats = r.turn_latencies || [];
    let avatarTurns = (r.avatar_response || '').split(' → ');
    const userTurns = (r.user_input || '').split(' → ');
    const userSttTurns = (r.user_transcript || '').split(' → ');
    const numTurns = Math.max(turnLats.length, avatarTurns.length, userTurns.length);
    // Pad avatarTurns with empty strings if shorter than numTurns (so each turn has a placeholder)
    while (avatarTurns.length < numTurns) avatarTurns.push('');
    // Treat as multi-turn if either user_input or turn_latencies indicates >1 turn
    const isMultiTurn = numTurns > 1 && (userTurns.length === numTurns || turnLats.length === numTurns || avatarTurns.length === numTurns);

    // Build full remark (used for single-turn) + per-turn remark (used for multi-turn)
    function renderGraderRow(g, displayMetric) {
      const isSkip = g.result === 'N/A';
      const cls = isSkip ? 'rb-skip' : (g.result === 'PASS' ? 'rb-pass' : (g.result === 'FAIL' ? 'rb-fail' : 'rb-warn'));
      const icon = isSkip ? '⊘' : (g.result === 'PASS' ? '✓' : (g.result === 'FAIL' ? '✗' : '!'));
      const score = (!isSkip && g.score !== null && g.score !== undefined) ? ` ${g.score}/5` : '';
      const label = displayMetric || g.metric;
      const skipTag = isSkip ? ' <span style="font-size:10px;color:#6b7280;font-weight:600;background:#f3f4f6;padding:1px 5px;border-radius:3px;margin-left:4px">ไม่ได้วัด</span>' : '';
      const rowCls = isSkip ? 'remark-item remark-skip' : 'remark-item';
      return `<div class="${rowCls}"><span class="remark-bullet ${cls}">${icon}</span><span><b>${esc(label)}${score}:</b>${skipTag} ${esc(g.reason || '')}</span></div>`;
    }
    const hideLat = isLatencyHiddenForCurrentCollection();
    let remarkHtml = '';
    (r.graders || []).forEach(g => {
      if (hideLat && isLatencyMetric(g.metric)) return;
      remarkHtml += renderGraderRow(g);
    });

    if (isMultiTurn) {
      // === MULTI-TURN: one sub-row per turn ===
      // Test ID/Scenario/Status = rowspan (shared overall)
      // AI Remark = per-turn (filter graders by _turn_N suffix; shared graders without suffix → turn 1)
      const allGraders = r.graders || [];
      for (let t = 0; t < numTurns; t++) {
        const turnNum = t + 1;
        const userText = userTurns[t] || '';
        const userStt = userSttTurns[t] || '';
        const avatarText = avatarTurns[t] || '';
        const turnLat = turnLats[t];

        // Per-turn remark: graders ending in _turn_<turnNum> or _t<turnNum> + (turn 1 only) graders without per-turn suffix (shared)
        let turnRemarkHtml = '';
        allGraders.forEach(g => {
          if (hideLat && isLatencyMetric(g.metric)) return;
          const metric = g.metric || '';
          // Match _turn_N or _tN suffix
          const m2 = metric.match(/^(.+?)_turn_(\d+)$/) || metric.match(/^(.+?)_t(\d+)$/);
          if (m2) {
            // per-turn grader
            if (parseInt(m2[2]) === turnNum) {
              turnRemarkHtml += renderGraderRow(g, m2[1]);
            }
          } else {
            // shared grader (e.g. response_latency, audio_input overall) → show on turn 1 only
            if (t === 0) turnRemarkHtml += renderGraderRow(g);
          }
        });
        if (!turnRemarkHtml) {
          turnRemarkHtml = `<div style="font-size:11px;opacity:.5">—</div>`;
        }

        // User input cell with STT diff
        const userCellHtml = `<div style="font-size:11px;color:#6b7280;font-weight:600;margin-bottom:2px">Turn ${turnNum}${turnLat ? ` <span style="color:#9ca3af;font-weight:400">(${Math.round(turnLat)}ms)</span>` : ''}</div>`
          + esc(userText)
          + (userStt && userStt !== userText ? `<div style="font-size:10px;color:#0ea5e9;margin-top:3px">💬 ${esc(userStt)}</div>` : '');

        // Response cell + expected ต่อ turn (ถ้ามีใน CSV) — ไม่ใช่ shared expected
        const turnMeta = (m.turns || []).find(mt => mt.turn === turnNum) || {};
        const turnExpected = turnMeta.expected_result || '';
        let cmpHtml = '<div class="cmp-block">';
        if (avatarText) {
          cmpHtml += `<div class="cmp-item cmp-avatar"><div class="cmp-label">🤖 Turn ${turnNum}</div>${esc(avatarText)}</div>`;
        } else {
          cmpHtml += `<div class="cmp-item cmp-avatar"><div class="cmp-label">🤖 Turn ${turnNum}</div><span style="opacity:.5">(no response)</span></div>`;
        }
        if (turnExpected) {
          cmpHtml += `<div class="cmp-item cmp-expected"><div class="cmp-label">📋 Expected Turn ${turnNum}</div>${esc(turnExpected)}</div>`;
        } else if (t === 0 && m.expected_result) {
          // Fallback: CSV ไม่มี turn column — ใช้ top-level expected
          cmpHtml += `<div class="cmp-item cmp-expected"><div class="cmp-label">📋 Expected</div>${esc(m.expected_result)}</div>`;
        }
        cmpHtml += '</div>';

        // Shared cells (Test ID, Scenario, Status) — rowspan only on first turn. AI Remark is per-turn now.
        let sharedCells = '';
        if (t === 0) {
          sharedCells = `<td rowspan="${numTurns}" style="vertical-align:top">${idHtml}</td>
            <td rowspan="${numTurns}" style="vertical-align:top"><span class="tag">${esc(r.scenario || '')}</span></td>`;
        }
        let statusCell = '';
        if (t === 0) {
          statusCell = `<td rowspan="${numTurns}" style="vertical-align:top"><span class="badge ${r.status.toLowerCase()}">${r.status}</span></td>`;
        }

        html += `<tr class="turn-row">
          ${sharedCells}
          <td style="max-width:200px">${userCellHtml}</td>
          <td>${cmpHtml}</td>
          <td style="vertical-align:top">${turnRemarkHtml}</td>
          ${statusCell}
        </tr>`;
      }
    } else {
      // === SINGLE-TURN: original single row ===
      const userHtml = esc(r.user_input || '') + (r.user_transcript && r.user_transcript !== r.user_input ? `<div style="font-size:10px;color:#0ea5e9;margin-top:3px">💬 ${esc(r.user_transcript)}</div>` : '');

      let cmpHtml = '<div class="cmp-block">';
      const reason = r.reason || '';
      if (r.status === 'FAIL' && reason.startsWith('Error:')) {
        cmpHtml += `<div class="cmp-item" style="background:#7f1d1d;color:#fecaca;border-left-color:#ef4444"><div class="cmp-label">❌ Error</div>${esc(reason)}</div>`;
      } else if (r.avatar_response) {
        cmpHtml += `<div class="cmp-item cmp-avatar"><div class="cmp-label">🤖 Avatar ตอบ</div>${esc(r.avatar_response)}</div>`;
      } else {
        cmpHtml += `<div class="cmp-item cmp-avatar"><div class="cmp-label">🤖 Avatar ตอบ</div><span style="opacity:.5">(no response)</span></div>`;
      }
      if (m.expected_result) cmpHtml += `<div class="cmp-item cmp-expected"><div class="cmp-label">📋 Expected</div>${esc(m.expected_result)}</div>`;
      cmpHtml += '</div>';

      html += `<tr>
        <td>${idHtml}</td>
        <td><span class="tag">${esc(r.scenario || '')}</span></td>
        <td style="max-width:200px">${userHtml}</td>
        <td>${cmpHtml}</td>
        <td>${remarkHtml}</td>
        <td><span class="badge ${r.status.toLowerCase()}">${r.status}</span></td>
      </tr>`;
    }
  });
  html += '</tbody></table>';
  return html;
}

// --- Section 2b: Run Instructions — แสดง collection_id, kiosk_id, และคำสั่งพร้อม copy ---
// ดึง collection_id จาก collection_url (ส่วนหลัง /collections/)
// ดึง kiosk_id จาก preset_url (ส่วนหลัง /preset/ หรือ /kiosk/preset/)
function extractIdFromUrl(url, segment) {
  if (!url) return '';
  const m = url.match(new RegExp(segment + '/([^/?#]+)'));
  return m ? m[1] : '';
}

// Guess preset folder จาก run_id prefix โดย match กับ list presets ของ project
// run_id pattern: <preset-slug>-<type>-<timestamp>-<hash>  เช่น hilton-rag-fast-..., podiliving-rag-walk-...
function guessPresetFromRuns(runs, allPresets) {
  for (const r of (runs || [])) {
    const rid = (r.run_id || '').toLowerCase();
    if (!rid) continue;
    // หา preset ที่ slug match prefix ของ rid — เลือกอันที่ match ยาวสุด
    let best = '';
    for (const p of allPresets) {
      const slug = p.replace(/^preset-/, '');  // เช่น 'hilton-thailand-rag'
      // ลองเทียบหลายแบบ — slug เต็ม หรือ token แรกๆ
      const tokens = slug.split('-');
      // สร้าง candidate prefixes ตั้งแต่ยาวลงสั้น เช่น hilton-thailand-rag, hilton-thailand, hilton-rag, hilton
      const candidates = [
        slug,
        tokens.slice(0, 2).join('-'),
        tokens[0] + '-' + tokens[tokens.length - 1],
        tokens[0],
      ];
      for (const c of candidates) {
        if (c && rid.startsWith(c + '-') && c.length > best.length) {
          best = p;
        }
      }
    }
    if (best) return best;
  }
  return '';
}

function renderRunInstructions(col) {
  const colUrl = col.collection_url || '';
  const presetUrl = col.preset_url || '';
  const cidFromUrl = extractIdFromUrl(colUrl, '/collections');
  const collectionId = cidFromUrl || col.id || '';
  const kioskId = extractIdFromUrl(presetUrl, '/presets?');

  if (!colUrl && !presetUrl) {
    return `<div style="background:#fffbeb;border:1px dashed #fcd34d;border-radius:8px;padding:10px 14px;margin-bottom:14px;color:#92400e;font-size:12px">
      💡 กด <b>✎ แก้ไข</b> เพื่อเพิ่ม Collection URL และ Preset URL — ระบบจะแสดง <b>collection_id</b>, <b>kiosk_id</b> และคำสั่งสำหรับรันให้อัตโนมัติ
    </div>`;
  }

  const proj = STATE.currentProject;
  const rc = (proj && proj.run_cmd) || {};
  const allPresets = rc.presets || [];
  const allTypes = rc.types || ['crawl', 'walk', 'run', 'manual'];
  const allMarkers = rc.markers || ['all', 'smoke', 'regression'];
  const pytestBin = resolvePytestBin(proj);
  const runs = (STATE.selectedCollection && STATE.selectedCollection.runs) || [];

  // Derive defaults — preset จาก col.preset (user บันทึกตอน create/edit) > guess จาก run prefix
  // type จาก collection.type
  const guessedPreset = guessPresetFromRuns(runs, allPresets);
  const inferredType = inferCollectionType(col);
  const defaultType = allTypes.includes(inferredType) ? inferredType : (allTypes[0] || 'walk');

  // ค่าที่ user เลือกผ่าน dropdown (cache ใน STATE) — override col.preset ได้ชั่วคราว
  STATE._runInstr = STATE._runInstr || {};
  const key = col.id;
  const sel = STATE._runInstr[key] || {};
  const selPreset = sel.preset || col.preset || guessedPreset || allPresets[0] || '';
  const selType = sel.type || defaultType;

  // สร้าง 1 บล็อกคำสั่งต่อ 1 marker — multi-line ตาม format ที่ admin ต้องการ
  // ส่ง TEST_COLLECTION_ID + KIOSK_PRESET_ID (ถ้ามี) ใน env
  const buildCmd = (marker) => {
    const envLines = [`TEST_COLLECTION_ID=${collectionId}`];
    if (kioskId) envLines.push(`KIOSK_PRESET_ID=${kioskId}`);
    const envBlock = envLines.join(' \\\n  ');
    return `${envBlock} \\\n  ${pytestBin} \\\n    ${selPreset}/test_${selType}.py \\\n    -v -s -m ${marker}`;
  };

  const cmdBlock = (marker) => {
    const cmd = buildCmd(marker);
    const safeCmd = esc(cmd).replace(/'/g, "&#39;");
    return `<div style="margin-top:10px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
        <div style="font-weight:600;font-size:12px;color:#374151">▶ Marker: <code style="background:#eef2ff;color:#4338ca;padding:1px 6px;border-radius:4px">-m ${esc(marker)}</code></div>
        <button class="btn btn-primary btn-sm" onclick="copyToClipboard(this.dataset.cmd, this)" data-cmd="${safeCmd}">📋 Copy</button>
      </div>
      <pre style="background:#111827;color:#e5e7eb;padding:10px 12px;border-radius:6px;font-size:12px;overflow-x:auto;margin:0;white-space:pre-wrap;word-break:break-all">${esc(cmd)}</pre>
    </div>`;
  };

  const row = (label, value, copyable) => {
    if (!value) return `<tr><td style="padding:6px 10px;color:#6b7280;font-weight:600;white-space:nowrap">${esc(label)}</td><td style="padding:6px 10px;color:#9ca3af;font-style:italic">(ยังไม่ได้กรอก)</td><td></td></tr>`;
    const safe = esc(value).replace(/'/g, "&#39;");
    const btn = copyable
      ? `<button class="btn btn-ghost btn-sm" onclick="copyToClipboard(this.dataset.v, this)" data-v="${safe}" title="คัดลอก">📋</button>`
      : '';
    return `<tr>
      <td style="padding:6px 10px;color:#374151;font-weight:600;white-space:nowrap">${esc(label)}</td>
      <td style="padding:6px 10px;color:#111827;font-family:ui-monospace,Menlo,monospace;font-size:12px;word-break:break-all">${esc(value)}</td>
      <td style="padding:6px 10px;text-align:right">${btn}</td>
    </tr>`;
  };

  // Preset ใน Run Instructions = disabled (แสดงค่าจาก col.preset เท่านั้น — แก้ผ่าน modal ✎ แก้ไข)
  const typeOpts = allTypes.map(t => `<option value="${esc(t)}" ${t===selType?'selected':''}>${esc(t)}</option>`).join('');

  const miniTable = (rowsHtml) => `<table style="width:100%;border-collapse:collapse;font-size:13px"><tbody>${rowsHtml}</tbody></table>`;
  const leftRows = `${row('collection_id', collectionId, true)}${row('kiosk_id', kioskId, true)}`;

          <input value="${esc(selPreset)}" disabled
