// สร้าง section "📤 คำสั่งให้ Claude อัปเดต JIRA" — prompt template สำหรับ Claude ที่มี
// collection link + screenshot path + สรุปผลรัน + JIRA epic/task — ผู้ใช้ copy ส่ง Claude เอง
function renderBackofficeJiraPush(col) {
  const epic = (col.jira_epic || '').trim();
  const run = (col.jira_run || '').trim();
  const keyOf = (s) => { const m = (s || '').match(/[A-Z]+-\d+/); return m ? m[0] : ''; };
  const epicKey = keyOf(epic);
  const runKey = keyOf(run);

  // ใช้สรุปจาก Section 10 (effective table) ที่ overlay แล้ว:
  //   1) admin saved (col.case_statuses) → 2) Playwright run result → 3) PENDING
  // ไม่ใช่จาก raw eff (Playwright reporter) เพราะ admin override ต้องชนะ
  const sum = STATE._boSummary;  // {caseIds, total, counts:{PENDING,PASS,FAIL,SKIP,REOPEN}}
  let total, passed, failed, pending, skipped;
  let passedCases, failedCases, pendingCases, skippedCases;
  if (sum && sum.total) {
    total = sum.total;
    passed = sum.counts.PASS || 0;
    failed = sum.counts.FAIL || 0;
    pending = sum.counts.PENDING || 0;
    skipped = sum.counts.SKIP || 0;
    // คำนวณ test_id list per status (overlay เหมือน table)
    const savedStatuses = col.case_statuses || {};
    const eff2 = (STATE.selectedCollection && STATE.selectedCollection.effective) || {};
    const runStatusMap = {};
    (eff2.results || []).forEach(r => {
      const tid = (r.test_id || '').trim();
      if (!tid) return;
      const s = (r.status || '').toUpperCase();
      if (s === 'PASS' || s === 'FAIL') runStatusMap[tid] = s;
      else runStatusMap[tid] = runStatusMap[tid] || 'PENDING';
    });
    const getStatus = (id) => savedStatuses[id] || runStatusMap[id] || 'PENDING';
    passedCases = sum.caseIds.filter(id => getStatus(id) === 'PASS');
    failedCases = sum.caseIds.filter(id => getStatus(id) === 'FAIL');
    pendingCases = sum.caseIds.filter(id => getStatus(id) === 'PENDING');
    skippedCases = sum.caseIds.filter(id => getStatus(id) === 'SKIP');
  } else {
    // Fallback: ใช้ eff โดยตรงถ้า summary ยังไม่ compute
    const eff = (STATE.selectedCollection && STATE.selectedCollection.effective) || {};
    total = eff.total || 0;
    passed = eff.passed || 0;
    failed = eff.failed || 0;
    pending = eff.pending || 0;
    skipped = 0;
    skippedCases = [];
    const results = eff.results || [];
    passedCases = results.filter(r => r.status === 'PASS').map(r => r.test_id);
    failedCases = results.filter(r => r.status === 'FAIL').map(r => r.test_id);
    pendingCases = results.filter(r => r.status === 'PENDING').map(r => r.test_id);
  }

  const shot = STATE.lastScreenshot[col.id];
  const shotDir = shot ? shot.dir : '';
  const shotTimeAgo = shot ? Math.round((Date.now() - shot.ts) / 1000) : 0;
  const pdf = STATE.lastPdf[col.id];
  const pdfPath = pdf ? pdf.path : '';
  const pdfTimeAgo = pdf ? Math.round((Date.now() - pdf.ts) / 1000) : 0;

  // Per-FAIL Playwright auto-screenshots (จาก result.attachments ใน reporter)
  // Map test_id → array of screenshot file paths
  const failShotsMap = {};
  const effRaw = (STATE.selectedCollection && STATE.selectedCollection.effective) || {};
  (effRaw.results || []).forEach(r => {
    if (r.status === 'FAIL' && Array.isArray(r.screenshots) && r.screenshots.length) {
      failShotsMap[r.test_id] = r.screenshots;
    }
  });

  // หมายเหตุ: ไม่ใช้ link localhost — JIRA reviewer เปิดไม่ได้
  // ส่งเป็นชื่อ collection + collection JSON path บน repo แทน เพื่อให้ Claude upload เนื้อหา
  const _colDir = (STATE.currentProject && STATE.currentProject.collections_dir)
    || 'docs/implementation-artifacts/tests/backoffice/results/collections';
  const collectionJsonPath = `${_colDir}/${col.id}.json`;

  let html = `<div style="background:#fff;border:1px solid #e5e7eb;border-radius:8px;padding:14px 16px;margin-top:12px">
    <div style="font-weight:700;font-size:13px;color:#1a1a2e;margin-bottom:2px">📤 คำสั่งอัปเดต JIRA</div>
    <div style="font-size:11px;color:#6b7280;margin-bottom:10px">Copy prompt → ส่งให้ Claude เพื่อ comment ผลลง Epic + Task ที่กรอกไว้</div>`;

  if (!epicKey && !runKey) {
    html += `<div style="background:#fffbeb;border:1px dashed #fcd34d;border-radius:6px;padding:8px 12px;color:#92400e;font-size:12px">
      ⚠️ ไม่ได้กรอก JIRA Epic หรือ JIRA Run task — กด <b>✎ แก้ไข</b> ที่ header
    </div></div>`;
    return html;
  }

  // PDF + Screenshot status
  if (pdfPath) {
    html += `<div style="margin-bottom:6px;padding:8px 10px;background:#ecfdf5;border:1px solid #a7f3d0;border-radius:5px;font-size:11px;color:#065f46">
      📄 PDF ล่าสุด (${pdfTimeAgo}s ago): <code style="background:#fff;padding:1px 5px;border-radius:3px;color:#065f46">${esc(pdfPath)}</code>
    </div>`;
  } else {
    html += `<div style="margin-bottom:6px;padding:8px 10px;background:#fef3c7;border:1px solid #fcd34d;border-radius:5px;font-size:11px;color:#92400e">
      ⚠️ ยังไม่ได้สร้าง PDF — กด <b>📄 PDF</b> ที่ header (แนะนำ เพราะอ่านง่ายใน JIRA)
    </div>`;
  }
  if (shotDir) {
    html += `<div style="margin-bottom:10px;padding:8px 10px;background:#f0f9ff;border:1px solid #bae6fd;border-radius:5px;font-size:11px;color:#075985">
      📸 Screenshot ล่าสุด (${shotTimeAgo}s ago): <code style="background:#fff;padding:1px 5px;border-radius:3px;color:#075985">${esc(shotDir)}</code> <span style="color:#9ca3af">(optional — สำหรับแนบเพิ่มเติมนอกเหนือ PDF)</span>
    </div>`;
  }

  // Build summary block (passed/failed/pending/skippedCases คำนวณข้างบนจาก overlay)
  // SKIP = admin override (กดเลือก SKIP ใน Section 10) — แยกจาก PENDING (ยังไม่ได้รัน)
  let summary = `Collection: ${col.name || col.id}\n`;
  const parts = [`${passed}/${total} PASS`, `${failed} FAIL`];
  if (pending) parts.push(`${pending} PENDING`);
  if (skipped) parts.push(`${skipped} SKIP`);
  summary += `สรุป: ${parts.join(' · ')}\n`;
  if (passedCases.length) summary += `PASS: ${passedCases.join(', ')}\n`;
  if (failedCases.length) summary += `FAIL: ${failedCases.join(', ')}\n`;
  if (pendingCases.length) summary += `PENDING: ${pendingCases.join(', ')}\n`;
  if (skippedCases.length) summary += `SKIP: ${skippedCases.join(', ')}\n`;

  // Build Claude prompt
  const targets = [];
  if (epicKey) targets.push(`Epic ${epicKey}`);
  if (runKey) targets.push(`Task ${runKey}`);
  const targetsStr = targets.join(' และ ');

  // Attachment lines — PDF เป็น primary, screenshot/JSON เป็น optional
  const attachmentLines = [];
  if (pdfPath) attachmentLines.push(`PDF (อ่านง่ายใน JIRA): ${pdfPath}`);
  if (shotDir) attachmentLines.push(`Screenshot folder (optional): ${shotDir}`);
  if (!pdfPath && !shotDir) attachmentLines.push(`(ยังไม่ได้สร้าง PDF/Screenshot — บอกผู้ใช้ให้กด 📄 PDF ที่ header ก่อน)`);
  const attachmentBlock = attachmentLines.join('\n');

  // Logic:
  // - Task รัน (runKey): comment สรุปผล + แนบ screenshot เสมอ

// Filter <option> ใน <select> ตาม keyword (substring match, case-insensitive)
// ใช้ใน modal สร้าง/แก้ไข Collection — Preset list มีเยอะ user พิมพ์ค้นหาได้
function filterPresetOptions(selectId, searchId) {
  const sel = document.getElementById(selectId);
  const inp = document.getElementById(searchId);
  if (!sel || !inp) return;
  const q = inp.value.trim().toLowerCase();
  let firstMatch = null;
  for (const opt of sel.options) {
    if (!opt.value) { opt.hidden = false; continue; }  // "— ไม่ระบุ —" โชว์เสมอ
    const match = !q || opt.value.toLowerCase().includes(q) || opt.textContent.toLowerCase().includes(q);
    opt.hidden = !match;
    if (match && !firstMatch) firstMatch = opt;
  }
  // ถ้า option ที่ select ปัจจุบันถูกซ่อน → เปลี่ยนไป option แรกที่ match
  if (sel.selectedOptions[0] && sel.selectedOptions[0].hidden && firstMatch) {
    sel.value = firstMatch.value;
  }
}

// Helper: copy ข้อความไป clipboard + flash ปุ่ม
async function copyToClipboard(text, btn) {
  try {
    await navigator.clipboard.writeText(text);
    if (btn) {
      const orig = btn.innerHTML;
      btn.innerHTML = '✓ คัดลอกแล้ว';
      setTimeout(() => { btn.innerHTML = orig; }, 1200);
    }
  } catch (e) {
    alert('คัดลอกไม่สำเร็จ: ' + e.message);
  }
}

// Copy Claude prompt — ถ้ายังไม่มี screenshot ให้แคปก่อน (สลับไปแท็บ effective + trigger capture)
// แล้วค่อย copy prompt ให้
async function copyClaudePromptWithScreenshot(text, btn) {
  const col = STATE.selectedCollection && STATE.selectedCollection.collection;
  if (!col) {
    return copyToClipboard(text, btn);
  }
  const hasShot = !!(STATE.lastScreenshot[col.id]);
  const hasPdf = !!(STATE.lastPdf[col.id]);
  // ถ้ามีหลักฐานอยู่แล้ว → copy ทันที (เหมือนเดิม)
  if (hasShot || hasPdf) {
    return copyToClipboard(text, btn);
  }
  // ยังไม่มี — confirm popup
  const ok = confirm('ยังไม่ได้แคปจอหรือสร้าง PDF\n\nระบบจะ:\n1. สลับไปแท็บ "🎯 Effective (รวมผล)"\n2. เริ่มแคปจอให้อัตโนมัติ\n3. รอจนแคปเสร็จ\n4. คัดลอก Prompt ให้\n\nกด OK เพื่อเริ่ม');
  if (!ok) return;
  // สลับ tab → effective (ที่มี header + ปุ่ม Screenshot)
  if (STATE.collectionSubTab !== 'effective') {
    STATE.collectionSubTab = 'effective';
    syncUrl();
    render();
  }
  // แสดง loading ใน btn เดิม
  const origText = btn ? btn.innerHTML : '';
  if (btn) {
    btn.disabled = true;
    btn.innerHTML = '⏳ กำลังแคปจอ...';
  }
  try {
    const pid = STATE.currentProject && STATE.currentProject.id;
    const res = await fetch(`/api/projects/${pid}/collections/${encodeURIComponent(col.id)}/screenshot`, {
      method: 'POST',
    });
    const data = await res.json();
    if (!res.ok || !data.ok) {
      throw new Error(data.error || data.stderr || 'screenshot failed');
    }
    STATE.lastScreenshot[col.id] = { dir: data.output_dir, ts: Date.now() };
    // copy ทันที (ใช้ text เดิมที่ส่งมา — caller รับผิดชอบรวม path ใน prompt ถ้าจำเป็น)
    await navigator.clipboard.writeText(text);
    if (btn) {
      btn.innerHTML = '✓ แคปจอ+คัดลอกแล้ว';
      setTimeout(() => { btn.innerHTML = origText; btn.disabled = false; }, 1500);
    }
    // re-render ถ้ายังอยู่ tab cmd จะอัปเดต path screenshot
    if (STATE.collectionSubTab === 'cmd') render();
  } catch (e) {
    if (btn) {
      btn.innerHTML = origText;
      btn.disabled = false;
    }
    alert('❌ แคปจอไม่สำเร็จ: ' + e.message);
  }
}

// --- Collection detail: table of runs bound to collection (Section 5 — Runs tab) ---
function renderCollectionRunsTable(runs) {
  if (!runs.length) {
    return '<div class="empty">ยังไม่มี run ใน collection นี้</div>';
  }
  const proj = STATE.currentProject;
  const pytestBin = resolvePytestBin(proj);
  // pythonBin: ใช้ venv python ถ้าเป็น kiosk-avatar (resync.py + report/generate.py ใช้ deps ใน venv)
  const pythonBin = (proj && proj.id === 'kiosk-avatar') ? '.venv/bin/python3' : 'python3';

  const rows = runs.map((r, i) => {
    const ts = r.timestamp ? new Date(r.timestamp).toLocaleString('th-TH') : '—';
    const total = r.total || (r.results || []).length || 0;
    const passed = r.passed != null ? r.passed : (r.results || []).filter(x => x.status === 'PASS').length;
    const failed = r.failed != null ? r.failed : (r.results || []).filter(x => x.status === 'FAIL').length;
    const pending = r.pending != null ? r.pending : (r.results || []).filter(x => x.status === 'PENDING').length;
    const rate = total ? Math.round(passed / total * 100) : 0;
    const dur = r.duration_seconds ? `${Math.round(r.duration_seconds)}s` : '—';

    // Resync command — ใช้ _file_rel (relative ต่อ project cwd) ที่ server ส่งมา
    const fileRel = r._file_rel || '';
    const resyncCmd = fileRel
      ? `${pythonBin} resync.py --file ${fileRel}`
      : `${pythonBin} resync.py  # ⚠ ไม่พบ file path — รัน default (latest result)`;
    const safeResync = esc(resyncCmd).replace(/'/g, "&#39;");

    // Grader command — copy prompt ให้ Claude grade content ของ run นี้
    // เก็บ run_id ไว้ใน data-rid เพื่อให้ handler อ่าน
    const ridAttr = esc(r.run_id);

    // Preset ID — แสดง full UUID เต็มเพื่อเทียบข้อมูล + click-to-copy (no truncate)
    const presetId = r.preset_id || '';
    const presetCell = presetId
      ? `<td style="font-family:ui-monospace,Menlo,monospace;font-size:11px;color:#374151;word-break:break-all" title="คลิกเพื่อคัดลอก"><span onclick="copyToClipboard('${esc(presetId)}', this)" style="cursor:pointer;min-width:270px;display:block">${esc(presetId)}</span></td>`
      : `<td style="text-align:center;color:#9ca3af">—</td>`;

    return `<tr>
      <td style="text-align:center;color:#6b7280">${i + 1}</td>
      <td><a href="#" onclick="event.preventDefault();setCollectionSubTab('${esc(r.run_id)}')" style="color:#2563eb;text-decoration:none" title="ดู run นี้">${esc(shortenRunId(r.run_id))}</a></td>
      ${presetCell}
      <td style="font-family:monospace;font-size:12px;color:#6b7280">${esc(ts)}</td>
      <td style="text-align:center">${total}</td>
      <td style="text-align:center;color:#10b981;font-weight:600">${passed}</td>
      <td style="text-align:center;color:#ef4444;font-weight:600">${failed}</td>
      <td style="text-align:center;color:#d97706">${pending}</td>
      <td style="text-align:center;font-weight:700;color:${rate >= 80 ? '#10b981' : rate >= 60 ? '#d97706' : '#ef4444'}">${rate}%</td>
      <td style="text-align:center;color:#6b7280">${dur}</td>
      <td style="text-align:center;white-space:nowrap">
        <button class="btn btn-ghost btn-sm" onclick="copyToClipboard(this.dataset.cmd, this)" data-cmd="${safeResync}" title="คัดลอกคำสั่ง resync ของ run นี้" style="font-size:11px;padding:2px 6px">🔄 Resync</button>
        <button class="btn btn-ghost btn-sm" onclick="copyGraderPromptForRun('${ridAttr}', this)" title="คัดลอก prompt สำหรับ Claude grade content" style="font-size:11px;padding:2px 6px">🤖 Grader</button>
        <button class="btn btn-ghost btn-sm" onclick="removeRunFromCollection('${ridAttr}')" title="ลบ run นี้ออกจาก collection (ไฟล์ผลจริงไม่ถูกลบ)" style="color:#ef4444;font-size:11px;padding:2px 6px">✕</button>
      </td>
    </tr>`;
  }).join('');
  return `<div style="overflow-x:auto;margin-bottom:16px">
    <table class="tbl" style="width:100%;font-size:13px">
      <thead>
        <tr>
          <th style="width:40px">#</th>
          <th>Run ID</th>
          <th style="width:100px" title="Preset ID (kiosk preset UUID)">Preset</th>
          <th style="width:160px">Timestamp</th>
          <th style="width:60px">Total</th>
          <th style="width:70px">PASS</th>
          <th style="width:70px">FAIL</th>
          <th style="width:80px">PENDING</th>
          <th style="width:70px">Rate</th>
          <th style="width:70px">Duration</th>
          <th style="width:200px">Action</th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>
  </div>`;
}

// Copy prompt สำหรับ Claude grade content ของ run ที่เลือก
// ส่ง path + test_ids ที่ pending ของ run นี้ให้ Claude
async function copyGraderPromptForRun(runId, btn) {
  const runs = (STATE.selectedCollection && STATE.selectedCollection.runs) || [];
  const r = runs.find(x => x.run_id === runId);
  if (!r) { alert('ไม่พบ run: ' + runId); return; }

  const fileRel = r._file_rel || '';
  const results = r.results || [];
  // เน้นเคสที่ยังไม่ grade — PENDING หรือ N/A ที่รอ content score
  const pendingCases = results.filter(x => {
    if (x.status === 'PENDING') return true;
    const hasContentScore = (x.graders || []).some(g =>
      ['faithfulness','correctness','hallucination'].includes((g.metric || '').replace(/_(turn_)?t?\d+$/, ''))
      && g.result !== 'N/A' && g.score != null
    );
    return !hasContentScore;
  });

  const pendingIds = pendingCases.map(x => x.test_id);
  const allIds = results.map(x => x.test_id);

  const prompt = [
    `Grade content ของ run "${shortenRunId(runId)}" (${results.length} เคส) ตาม GRADING_GUIDE.md`,
    '',
    `ไฟล์ result: ${fileRel || '(ไม่พบ — โปรดตรวจสอบ run_id)'}`,
    `Run ID: ${runId}`,
    `Total cases: ${results.length} (PENDING/no-content-score: ${pendingIds.length})`,
    '',
    'งานที่ต้องทำ:',
    '1. อ่านไฟล์ result JSON ข้างต้น',
    '2. Grade แต่ละเคสด้วย 3 metrics: faithfulness, correctness, hallucination (1-5 scale)',
    '   - **ต้องใช้ full test_id** (เช่น HILTON-RAG-C001) ห้ามย่อ — ตาม GRADING_GUIDE 6.1',
    '   - อ้างอิง KB จาก preset folder ที่เกี่ยวข้อง',
    '3. อัพเดทไฟล์ result JSON โดยตรง — เพิ่ม grader objects ใน `graders[]` ของแต่ละเคส',
    '4. Update `status` (PASS/FAIL/PENDING) ตามเกณฑ์ใน GRADING_GUIDE',
    '',
    pendingIds.length
      ? `เคสที่ต้องการ grade (${pendingIds.length}):\n${pendingIds.join(', ')}`
      : `เคสทั้งหมด (${allIds.length}):\n${allIds.join(', ')}`,
    '',
    'เมื่อเสร็จ — รัน `.venv/bin/python report/generate.py` ที่ tests/kiosk-avatar เพื่อ regenerate report',
  ].join('\n');

  try {
    await navigator.clipboard.writeText(prompt);
    if (btn) {
      const orig = btn.innerHTML;
      btn.innerHTML = '✓ คัดลอกแล้ว';
      setTimeout(() => { btn.innerHTML = orig; }, 1200);
    } else {
      alert(`Copied grader prompt — ${results.length} เคส (${prompt.length} chars)\n\nวางในแชท Claude ได้เลย`);
    }
  } catch (e) {
    alert('คัดลอกไม่สำเร็จ: ' + e.message);
  }
}

// --- JIRA refresh button with spinner + last-fetched timestamp ---
function renderJiraRefreshBtn(loading, fetchedAt, onclickJs) {
  const spin = loading
    ? '<span class="jira-spin" style="display:inline-block;animation:jspin 0.8s linear infinite">🔄</span>'
    : '🔄';
  const ts = fetchedAt
    ? `<span style="margin-right:8px;font-size:11px;color:#6b7280">อัพเดตล่าสุด ${new Date(fetchedAt).toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit',second:'2-digit'})}</span>`
    : '';
  const disabled = loading ? 'disabled style="opacity:0.5;cursor:not-allowed"' : '';
  return `${ts}<button class="btn btn-ghost btn-sm" onclick="${onclickJs}" ${disabled}>${spin} ${loading ? 'กำลังโหลด…' : 'Refresh'}</button>`;
}

// --- Collection detail: JIRA status badge color ---
function jiraStatusStyle(cat) {
  // statusCategory keys: "new" (To Do), "indeterminate" (In Progress), "done" (Done)
  if (cat === 'done') return 'background:#ecfdf5;color:#047857;border:1px solid #6ee7b7';
  if (cat === 'indeterminate') return 'background:#eff6ff;color:#1d4ed8;border:1px solid #93c5fd';
  return 'background:#fef3c7;color:#92400e;border:1px solid #fcd34d';  // new / To Do
}

// --- Collection detail: JIRA issue type badge ---
function jiraTypeStyle(t) {
  if (t === 'Bug') return 'background:#fef2f2;color:#991b1b;border:1px solid #fca5a5';
  if (t === 'Story') return 'background:#f0fdf4;color:#166534;border:1px solid #86efac';
  if (t === 'Epic') return 'background:#faf5ff;color:#6b21a8;border:1px solid #d8b4fe';
  if (t === 'Task') return 'background:#f0f9ff;color:#075985;border:1px solid #7dd3fc';
  return 'background:#f3f4f6;color:#374151;border:1px solid #d1d5db';
}

    ).join('');

      <span style="font-size:13px;color:#374151">รวม <b>${jira.issues.length}</b> issues</span>
      <span style="color:#d1d5db;margin:0 4px">|</span>
      ${typeBadges}
      <span style="color:#d1d5db;margin:0 4px">|</span>

      <a onclick="setCollectionSubTab('jira')" style="margin-left:auto;cursor:pointer;color:#2563eb;font-size:12px;text-decoration:underline">ดูทั้งหมด →</a>
    </div>`;
  }
  const fetchedAt = jira && jira._fetched_at;
  return `<div style="background:#fafafa;padding:10px 14px;border-radius:6px;border:1px solid #e5e7eb;margin-bottom:12px">

function renderCollectionJiraTable(jira, cid) {
  const fetchedAt = jira && jira._fetched_at;
  let header = `<div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap">
    <span style="font-weight:700;font-size:15px;color:#374151">🐛 JIRA Tasks ที่เชื่อมโยงกับ collection นี้</span>
    <span style="margin-left:auto">${renderJiraRefreshBtn(STATE.selectedCollectionJiraLoading, fetchedAt, 'refreshCollectionJira()')}</span>
  </div>`;

  if (jira === null || jira === undefined) {
    return header + '<div class="empty">กำลังโหลดจาก JIRA …</div>';
  }
  if (!jira.configured) {
    return header + `<div style="background:#fffbeb;border-left:4px solid #d97706;padding:12px 16px;border-radius:6px;color:#92400e;font-size:13px">
      <b>JIRA ยังไม่ถูกตั้งค่า</b> — สร้างไฟล์ <code style="background:#fef3c7;padding:2px 6px;border-radius:3px">.claude/jira_config.md</code> ที่มี:<br>
      <code style="display:block;margin-top:6px;background:#fef3c7;padding:8px;border-radius:3px;font-size:12px">JIRA_BASE_URL=https://your-company.atlassian.net<br>JIRA_EMAIL=...<br>JIRA_API_TOKEN=...<br>JIRA_PROJECT_KEY=...</code>
    </div>`;
  }
  if (!jira.issues.length) {
    return header + `<div class="empty" style="padding:20px;background:#fafafa;border-radius:6px">
      ยังไม่มี JIRA issue ที่เชื่อมโยงกับ collection <code>${esc(cid)}</code><br>
      <span style="font-size:12px;color:#6b7280;margin-top:8px;display:block">Query: issues ใน project <b>${esc(jira.project_key)}</b> ที่มีข้อความ "${esc(cid)}" ใน description</span>
    </div>`;
  }

  const rows = jira.issues.map((i, idx) => {
    const created = i.created ? new Date(i.created).toLocaleString('th-TH') : '—';
    const labels = (i.labels || []).map(l =>
      `<span style="display:inline-block;background:#f3f4f6;color:#4b5563;padding:1px 6px;border-radius:8px;font-size:11px;margin-right:3px">${esc(l)}</span>`
    ).join('');
    return `<tr>
      <td style="text-align:center;color:#6b7280">${idx + 1}</td>
      <td><a href="${esc(i.url)}" target="_blank" style="color:#2563eb;text-decoration:none;font-weight:600">${esc(i.key)}</a></td>
      <td style="text-align:center"><span style="padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600;${jiraTypeStyle(i.type)}">${esc(i.type)}</span></td>
      <td style="text-align:center"><span style="padding:2px 8px;border-radius:12px;font-size:11px;font-weight:600;${jiraStatusStyle(i.status_category)}">${esc(i.status)}</span></td>
      <td style="font-size:13px">${esc(i.summary)}</td>
      <td style="font-size:12px;color:#4b5563">${esc(i.assignee)}</td>
      <td>${labels}</td>
      <td style="font-family:monospace;font-size:11px;color:#6b7280">${esc(created)}</td>
    </tr>`;
  }).join('');

  return header + `<div style="overflow-x:auto;margin-bottom:16px">
    <table class="tbl" style="width:100%;font-size:13px">
      <thead>
        <tr>
          <th style="width:40px">#</th>
          <th style="width:90px">Key</th>
          <th style="width:70px">Type</th>
          <th style="width:110px">Status</th>
          <th>Summary</th>
          <th style="width:140px">Assignee</th>
          <th style="width:180px">Labels</th>
          <th style="width:140px">Created</th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>

}

async function renderJiraView() {

  }
  // Lazy-load on first open
  if (STATE.jiraAll === null) {
    root.innerHTML = '<div class="empty">กำลังโหลดจาก JIRA …</div>';
    try {
      const res = await api.get(`/api/projects/${pid}/jira-all`);
      res._fetched_at = Date.now();
      STATE.jiraAll = res;
    } catch (e) {
      root.innerHTML = `<div class="empty">โหลด JIRA ไม่สำเร็จ: ${esc(String(e))}</div>`;

      <button class="btn btn-ghost btn-sm ${STATE.jiraView==='flat'?'active':''}"

    </div>`;

    return;

      ).join('');

      html += `<div style="background:#fff;border:1px solid #e5e7eb;border-radius:8px;margin-bottom:14px;overflow:hidden">
        <div style="padding:10px 14px;background:#fafafa;border-bottom:1px solid #e5e7eb;display:flex;align-items:center;gap:10px;flex-wrap:wrap">
          <a href="#" onclick="event.preventDefault();openCollectionFromJira('${esc(c.collection_id)}')" style="color:#2563eb;text-decoration:none;font-weight:600;font-size:14px">${esc(c.collection_name)}</a>

          <span style="margin-left:auto;font-size:12px;color:#374151"><b>${c.issues.length}</b> issues</span>

              <th style="width:140px">Created</th>

                <td><a href="${esc(i.url)}" target="_blank" style="color:#2563eb;text-decoration:none;font-weight:600">${esc(i.key)}</a></td>
                <td style="text-align:center"><span style="padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600;${jiraTypeStyle(i.type)}">${esc(i.type)}</span></td>
                <td style="text-align:center"><span style="padding:2px 8px;border-radius:12px;font-size:11px;font-weight:600;${jiraStatusStyle(i.status_category)}">${esc(i.status)}</span></td>

            <th style="width:110px">Status</th>

            <th style="width:240px">Collection</th>
            <th style="width:140px">Created</th>
          </tr>
        </thead>

    let idx = 0;
    collections.forEach(c => {
      c.issues.forEach(i => {
        idx++;
        const created = i.created ? new Date(i.created).toLocaleString('th-TH') : '—';
        html += `<tr>
          <td style="text-align:center;color:#6b7280">${idx}</td>
          <td><a href="${esc(i.url)}" target="_blank" style="color:#2563eb;text-decoration:none;font-weight:600">${esc(i.key)}</a></td>
          <td style="text-align:center"><span style="padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600;${jiraTypeStyle(i.type)}">${esc(i.type)}</span></td>
          <td style="text-align:center"><span style="padding:2px 8px;border-radius:12px;font-size:11px;font-weight:600;${jiraStatusStyle(i.status_category)}">${esc(i.status)}</span></td>
          <td style="font-size:13px">${esc(i.summary)}</td>
          <td style="font-size:12px;color:#4b5563">${esc(i.assignee)}</td>
          <td style="font-size:12px"><a href="#" onclick="event.preventDefault();openCollectionFromJira('${esc(c.collection_id)}')" style="color:#2563eb;text-decoration:none">${esc(c.collection_name)}</a></td>

        </tr>`;
      });
    });
    html += '</tbody></table></div>';
  }

  root.innerHTML = html;
}

function setJiraView(v) {
  STATE.jiraView = v;
  render();
}

async function refreshJiraAll() {
  const pid = STATE.currentProject && STATE.currentProject.id;
  if (!pid) return;
  STATE.jiraAllLoading = true;
  render();
  try {
    const res = await api.get(`/api/projects/${pid}/jira-all?fresh=1`);
    res._fetched_at = Date.now();
    STATE.jiraAll = res;
  } catch (e) {
    STATE.jiraAll = {configured: false, collections: [], error: String(e), _fetched_at: Date.now()};
  }
  STATE.jiraAllLoading = false;
  render();
}

// Jump from JIRA view to collection detail (reuses existing setMainTab + selectCollection)
function openCollectionFromJira(cid) {
  setMainTab('collections');
  selectCollection(cid);
}

// ============================================================
// 13. COLLECTIONS VIEW — หน้ารวมผลการรัน
// ============================================================
// มี 2 mode:
//   - LIST MODE:   ไม่มี selectedCollectionId → แสดง list การ์ด + filter
//   - DETAIL MODE: มี selectedCollectionId    → แสดง verdict + breakdown + return cases + sub-tabs + table
async function renderCollections() {
  const root = document.getElementById('viewCollections');

  // ----- LIST MODE (no selection) -----
  if (!STATE.selectedCollectionId) {
    // Lazy-load JIRA in background — เพื่อแสดง Bug count คอลัมน์
    // ไม่ block render หลัก, พอโหลดเสร็จค่อย re-render
    if (STATE.jiraAll === null && !STATE.jiraAllLoading) {
      STATE.jiraAllLoading = true;
      const pid = STATE.currentProject && STATE.currentProject.id;
      if (pid) {
        api.get(`/api/projects/${pid}/jira-all`).then(res => {
          res._fetched_at = Date.now();
          STATE.jiraAll = res;
          STATE.jiraAllLoading = false;
          // Re-render only if still on list mode
          if (!STATE.selectedCollectionId && STATE.mainTab === 'collections') render();
        }).catch(() => { STATE.jiraAllLoading = false; });
      }
    }

    const df = STATE.collectionDateFilter;
    const search = (STATE.collectionSearch || '').trim().toLowerCase();
    const typeF = STATE.collectionType || 'all';
    const catF = STATE.collectionCategory || 'all';

    // Available y/m/d from collection created_at
    const parts = STATE.collections
      .map(c => (c.created_at || '').slice(0, 10))
      .filter(Boolean)
      .map(d => ({y: d.slice(0,4), m: d.slice(5,7), d: d.slice(8,10)}));
    const years = [...new Set(parts.map(p => p.y))].sort().reverse();
    const months = [...new Set(parts.filter(p => !df.y || p.y === df.y).map(p => p.m))].sort();
    const days = [...new Set(parts.filter(p => (!df.y || p.y === df.y) && (!df.m || p.m === df.m)).map(p => p.d))].sort();

    // Available types (only those present)
    const typesPresent = [...new Set(STATE.collections.map(inferCollectionType))];
    // Available categories (only those present; empty string → "none")
    const catsPresent = [...new Set(STATE.collections.map(c => c.category || 'none'))];

    // Apply all filters
    const filtered = STATE.collections.filter(c => {
      // Date
      const k = (c.created_at || '').slice(0, 10);
      const [y, m, d] = k ? [k.slice(0,4), k.slice(5,7), k.slice(8,10)] : ['','',''];
      if (df.y && y !== df.y) return false;
      if (df.m && m !== df.m) return false;
      if (df.d && d !== df.d) return false;
      // Type
      if (typeF !== 'all' && inferCollectionType(c) !== typeF) return false;
      // Category
      if (catF !== 'all' && (c.category || 'none') !== catF) return false;
      // Search (name + description)
      if (search) {
        const hay = `${c.name || ''} ${c.description || ''}`.toLowerCase();
        if (!hay.includes(search)) return false;
      }
      return true;
    });

    let html = `<div class="toolbar">
      <button class="btn btn-primary btn-sm" style="margin-left:auto" onclick="openCreateCollectionModal()">+ สร้าง Collection</button>
    </div>`;

    if (STATE.collections.length > 0) {
      // Row 1: search + type
      html += `<div class="toolbar">
        <label>ค้นหา:</label>
        <input type="search" id="colSearchInput" placeholder="ค้นหาจากชื่อหรือคำอธิบาย..." value="${esc(STATE.collectionSearch)}" oninput="onCollectionSearchInput(this.value)">
        <label>ประเภท:</label>
        <select class="sel-sm" style="min-width:120px" onchange="selectCollectionType(this.value)">
          <option value="all" ${typeF==='all'?'selected':''}>${TYPE_LABELS.all} (${STATE.collections.length})</option>
          ${typesPresent.map(t => {
            const n = STATE.collections.filter(c => inferCollectionType(c) === t).length;
            return `<option value="${esc(t)}" ${typeF===t?'selected':''}>${TYPE_LABELS[t] || t} (${n})</option>`;
          }).join('')}
        </select>
        <label>หมวด:</label>
        <select class="sel-sm" style="min-width:130px" onchange="selectCollectionCategory(this.value)">
          <option value="all" ${catF==='all'?'selected':''}>ทั้งหมด (${STATE.collections.length})</option>
          ${catsPresent.map(cat => {
            const n = STATE.collections.filter(c => (c.category || 'none') === cat).length;
            const label = cat === 'none' ? '— ไม่ระบุ —' : (CATEGORY_LABELS[cat] || cat);
            return `<option value="${esc(cat)}" ${catF===cat?'selected':''}>${label} (${n})</option>`;
          }).join('')}
        </select>
        ${(search || typeF !== 'all' || catF !== 'all') ? `<button class="btn btn-ghost btn-sm" onclick="clearCollectionSearch()">ล้าง</button>` : ''}
      </div>`;

      // Row 2: date
      html += `<div class="toolbar">
        <label>Date:</label>
        <select class="sel-sm sel-year" onchange="selectCollectionDatePart('y', this.value)">
          <option value="" ${df.y===''?'selected':''}>— ปี —</option>
          ${years.map(y => `<option value="${esc(y)}" ${df.y===y?'selected':''}>${esc(y)}</option>`).join('')}
        </select>
        <select class="sel-sm sel-mon" onchange="selectCollectionDatePart('m', this.value)">
          <option value="" ${df.m===''?'selected':''}>— เดือน —</option>
          ${months.map(m => `<option value="${esc(m)}" ${df.m===m?'selected':''}>${esc(m)}</option>`).join('')}
        </select>
        <select class="sel-sm sel-day" onchange="selectCollectionDatePart('d', this.value)">
          <option value="" ${df.d===''?'selected':''}>— วัน —</option>
          ${days.map(d => `<option value="${esc(d)}" ${df.d===d?'selected':''}>${esc(d)}</option>`).join('')}
        </select>
        ${(df.y||df.m||df.d) ? `<button class="btn btn-ghost btn-sm" onclick="clearCollectionDateFilter()">ล้างวันที่</button>` : ''}
        <span style="font-size:11px;color:#6b7280;margin-left:auto">${filtered.length} / ${STATE.collections.length} collections</span>
      </div>`;
    }

    if (!STATE.collections.length) {
      html += '<div class="empty">ยังไม่มี Collection — กด "+ สร้าง Collection" เพื่อเริ่ม</div>';
    } else if (!filtered.length) {
      html += '<div class="empty">ไม่ตรงกับตัวกรองที่เลือก</div>';
    } else {
      // Pagination — 25 rows per page
      const PAGE_SIZE = 25;
      const totalPages = Math.max(1, Math.ceil(filtered.length / PAGE_SIZE));
      let currentPage = Math.min(Math.max(1, STATE.collectionPage || 1), totalPages);
      if (currentPage !== STATE.collectionPage) STATE.collectionPage = currentPage;
      const startIdx = (currentPage - 1) * PAGE_SIZE;
      const endIdx = Math.min(startIdx + PAGE_SIZE, filtered.length);
      const pageRows = filtered.slice(startIdx, endIdx);

      // Build JIRA bug count map: collection_id → number of issues with issuetype=Bug
      const bugCountMap = {};
      const allIssuesCountMap = {};  // for tooltip — รวมทั้ง Task/Story/Bug
      if (STATE.jiraAll && STATE.jiraAll.collections) {
        STATE.jiraAll.collections.forEach(jc => {
          const issues = jc.issues || [];
          allIssuesCountMap[jc.collection_id] = issues.length;
          bugCountMap[jc.collection_id] = issues.filter(i => (i.type || '').toLowerCase() === 'bug').length;
        });
      }
      const jiraLoading = STATE.jiraAllLoading || STATE.jiraAll === null;

      // Table layout — replaces card view
      html += `<div style="margin-top:8px;overflow-x:auto">
        <table class="collections-table" style="width:100%;border-collapse:collapse;font-size:13px;background:#fff;border:1px solid #e5e7eb;border-radius:8px;overflow:hidden">
          <thead style="background:#f9fafb">
            <tr style="text-align:left;color:#374151;font-weight:600;font-size:12px;text-transform:uppercase;letter-spacing:0.03em">
              <th style="padding:6px 12px;border-bottom:1px solid #e5e7eb">ชื่อ Collection</th>
              <th style="padding:6px 12px;border-bottom:1px solid #e5e7eb">ประเภท</th>
              <th style="padding:6px 12px;border-bottom:1px solid #e5e7eb">หมวด</th>
              <th style="padding:6px 12px;border-bottom:1px solid #e5e7eb;text-align:center">Runs</th>
              <th style="padding:6px 12px;border-bottom:1px solid #e5e7eb;text-align:center">Total</th>
              <th style="padding:6px 12px;border-bottom:1px solid #e5e7eb;text-align:center">Pass</th>
              <th style="padding:6px 12px;border-bottom:1px solid #e5e7eb;text-align:center">Fail</th>
              <th style="padding:6px 12px;border-bottom:1px solid #e5e7eb;text-align:center">Pend</th>
              <th style="padding:6px 12px;border-bottom:1px solid #e5e7eb;text-align:center" title="จำนวน JIRA Bug task ที่ relate กับ collection นี้">🐛 Bug</th>
              <th style="padding:6px 12px;border-bottom:1px solid #e5e7eb;text-align:center">Pass %</th>
              <th style="padding:6px 12px;border-bottom:1px solid #e5e7eb;text-align:center" title="ผ่าน/ไม่ผ่าน — เกณฑ์ Pass Rate ≥ 95%">Verdict</th>
              <th style="padding:6px 12px;border-bottom:1px solid #e5e7eb">สร้าง</th>
              <th style="padding:6px 12px;border-bottom:1px solid #e5e7eb;text-align:center">Action</th>
            </tr>
          </thead>
          <tbody>`;
      pageRows.forEach(c => {
        const created = c.created_at ? new Date(c.created_at).toLocaleString('th-TH') : '';
        const updated = c.updated_at ? new Date(c.updated_at).toLocaleString('th-TH') : '';
        const t = inferCollectionType(c);
        const catLabel = c.category ? (CATEGORY_LABELS[c.category] || c.category) : '—';
        const s = c.summary || {total: 0, passed: 0, failed: 0, pending: 0, reopened: 0, improvement: 0, warn: 0, pass_rate: 0};
        const descBlock = c.description
          ? `<div style="font-size:11px;color:#6b7280;margin-top:2px;max-width:340px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${esc(c.description)}">${esc(c.description)}</div>`
          : '';
        const passRateCell = s.total > 0
          ? `<span style="background:#eef2ff;color:#4338ca;padding:2px 8px;border-radius:6px;font-weight:600">${s.pass_rate}%</span>`
          : '<span style="color:#9ca3af">—</span>';
        // Verdict:
        //   Backoffice: ไม่มี FAIL = ผ่าน (PENDING = intentional test.skip() — ครอบคลุมโดย TC อื่น)
        //   อื่นๆ (Avatar/Kiosk): (PASS + IMPROVEMENT) / Total ≥ 95% → ผ่าน
        const _isBackoffice = isBackofficeFormat(STATE.currentProject);
        let verdictCell;
        if (s.total === 0) {
          verdictCell = '<span style="color:#9ca3af">—</span>';
        } else if (_isBackoffice) {
          const failedCount = s.failed || 0;
          if (failedCount === 0) {
            verdictCell = `<span style="background:#d1fae5;color:#065f46;padding:3px 10px;border-radius:6px;font-weight:600;font-size:12px" title="${s.passed} PASS · ${s.pending || 0} PENDING (intentional skip) · 0 FAIL">✅ ผ่าน</span>`;
          } else {
            verdictCell = `<span style="background:#fee2e2;color:#991b1b;padding:3px 10px;border-radius:6px;font-weight:600;font-size:12px" title="${failedCount} FAIL จากทั้งหมด ${s.total} เคส">❌ ไม่ผ่าน</span>`;
          }
        } else {
          const functionalPass = (s.passed || 0) + (s.improvement || 0);
          const functionalRate = Math.round(functionalPass / s.total * 1000) / 10;
          verdictCell = functionalRate >= 95
            ? `<span style="background:#d1fae5;color:#065f46;padding:3px 10px;border-radius:6px;font-weight:600;font-size:12px" title="(Pass ${s.passed} + Imp ${s.improvement || 0}) / ${s.total} = ${functionalRate}% ≥ 95%">✅ ผ่าน</span>`
            : `<span style="background:#fee2e2;color:#991b1b;padding:3px 10px;border-radius:6px;font-weight:600;font-size:12px" title="(Pass ${s.passed} + Imp ${s.improvement || 0}) / ${s.total} = ${functionalRate}% < 95%">❌ ไม่ผ่าน</span>`;
        }
        const numCell = (n, color) => n > 0
          ? `<b style="color:${color}">${n}</b>`
          : `<span style="color:#9ca3af">0</span>`;
        html += `<tr onclick="openCollection('${esc(c.id)}')" style="cursor:pointer;border-bottom:1px solid #f3f4f6" onmouseover="this.style.background='#f9fafb'" onmouseout="this.style.background=''">
          <td style="padding:6px 12px">
            <div style="font-weight:600;color:#1a1a2e;line-height:1.3">${esc(c.name)}</div>
            ${descBlock}
          </td>
          <td style="padding:6px 12px"><span class="tag">${TYPE_LABELS[t] || t}</span></td>
          <td style="padding:6px 12px">${c.category ? `<span class="tag" style="background:#fdf2f8;color:#be185d">${esc(catLabel)}</span>` : '<span style="color:#9ca3af">—</span>'}</td>
          <td style="padding:6px 12px;text-align:center">${c.run_ids.length}</td>
          <td style="padding:6px 12px;text-align:center"><b style="color:#1a1a2e">${s.total}</b></td>
          <td style="padding:6px 12px;text-align:center">${numCell(s.passed, '#10b981')}</td>
          <td style="padding:6px 12px;text-align:center">${numCell(s.failed, '#ef4444')}</td>
          <td style="padding:6px 12px;text-align:center">${numCell(s.pending, '#9ca3af')}</td>
          <td style="padding:6px 12px;text-align:center">${
            jiraLoading
              ? '<span style="color:#d1d5db" title="กำลังโหลดจาก JIRA…">⏳</span>'
              : (bugCountMap[c.id] > 0
                  ? `<b style="color:#dc2626" title="${bugCountMap[c.id]} bug / ${allIssuesCountMap[c.id] || 0} issues รวม">${bugCountMap[c.id]}</b>`
                  : (allIssuesCountMap[c.id] > 0
                      ? `<span style="color:#9ca3af" title="${allIssuesCountMap[c.id]} issues รวม (ไม่มี Bug)">0</span>`
                      : '<span style="color:#9ca3af">—</span>'))
          }</td>
          <td style="padding:6px 12px;text-align:center">${passRateCell}</td>
          <td style="padding:6px 12px;text-align:center">${verdictCell}</td>
          <td style="padding:6px 12px;color:#6b7280;font-size:12px;white-space:nowrap">${esc(created)}</td>
          <td style="padding:6px 12px;text-align:center;white-space:nowrap">
            <button class="btn btn-ghost btn-sm" style="font-size:18px;line-height:1;padding:6px 10px" onclick="event.stopPropagation();duplicateCollection('${esc(c.id)}')" title="ทำซ้ำ — copy ฟิลด์ทั้งหมดยกเว้น JIRA Run task และผลรัน">⧉</button>
            <button class="btn btn-ghost btn-sm" style="font-size:18px;line-height:1;padding:6px 10px" onclick="event.stopPropagation();editCollectionFromList('${esc(c.id)}')" title="แก้ไข Collection">✎</button>
            <button class="btn btn-danger btn-sm" style="font-size:18px;line-height:1;padding:6px 10px" onclick="event.stopPropagation();deleteCollectionFromList('${esc(c.id)}')" title="ลบ Collection">🗑</button>
          </td>
        </tr>`;
      });
      html += `</tbody></table></div>`;

      // Pagination controls (show only if > 1 page)
      if (totalPages > 1) {
        // Build page number buttons (max 7 visible: first, ..., current±2, ..., last)
        const pageBtns = [];
        const addBtn = (p, label, active, disabled) => {
          const isActive = active === true;
          const isDisabled = disabled === true;
          const style = isActive
            ? 'background:#4338ca;color:#fff;border-color:#4338ca;font-weight:600'
            : isDisabled
              ? 'background:#f9fafb;color:#9ca3af;cursor:not-allowed'
              : 'background:#fff;color:#374151;cursor:pointer';
          const onclick = (isActive || isDisabled) ? '' : `onclick="goToCollectionPage(${p})"`;
          pageBtns.push(`<button ${onclick} style="min-width:32px;padding:6px 10px;border:1px solid #e5e7eb;border-radius:6px;font-size:12px;${style}">${label}</button>`);
        };
        // Prev
        addBtn(currentPage - 1, '‹ ก่อนหน้า', false, currentPage <= 1);
        // Page numbers (smart ellipsis)
        const showAll = totalPages <= 7;
        const pagesToShow = new Set();
        if (showAll) {
          for (let i = 1; i <= totalPages; i++) pagesToShow.add(i);
        } else {
          pagesToShow.add(1);
          pagesToShow.add(totalPages);
          for (let i = Math.max(2, currentPage - 1); i <= Math.min(totalPages - 1, currentPage + 1); i++) {
            pagesToShow.add(i);
          }
        }
        const sortedPages = [...pagesToShow].sort((a, b) => a - b);
        let prev = 0;
        for (const p of sortedPages) {
          if (prev && p - prev > 1) {
            pageBtns.push(`<span style="padding:6px 4px;color:#9ca3af;font-size:12px">…</span>`);
          }
          addBtn(p, String(p), p === currentPage, false);
          prev = p;
        }
        // Next
        addBtn(currentPage + 1, 'ถัดไป ›', false, currentPage >= totalPages);

        html += `<div style="display:flex;align-items:center;justify-content:space-between;margin-top:12px;padding:6px 4px;gap:12px;flex-wrap:wrap">
          <div style="font-size:12px;color:#6b7280">แสดง <b style="color:#1a1a2e">${startIdx + 1}–${endIdx}</b> จาก <b style="color:#1a1a2e">${filtered.length}</b> รายการ · หน้า <b style="color:#1a1a2e">${currentPage}/${totalPages}</b></div>
          <div style="display:flex;gap:4px;align-items:center">${pageBtns.join('')}</div>
        </div>`;
      }
    }
    root.innerHTML = html;
    return;
  }

  // ----- DETAIL MODE (one collection selected) -----
  if (!STATE.selectedCollection || STATE.selectedCollection.collection.id !== STATE.selectedCollectionId) {
    await loadCollectionDetail(STATE.selectedCollectionId);
  }

  // === SECTION 1: Action toolbar === (ปุ่ม กลับ / + เพิ่มการรัน / 🗑 ลบ)
  // Backoffice ซ่อน:
  //   - "+ เพิ่มการรัน" (ไม่มี automated runs)
  //   - "📦 Copy JSON" (admin set status เอง — ไม่มี effective results เป็น JSON)
  //   - "✎ แก้ไข" (ย้ายไปอยู่ใต้ชื่อ Collection พร้อม 🐛 JIRA)
  const _isBackofficeToolbar = isBackofficeFormat(STATE.currentProject);
  let html = `<!-- ===== SECTION 1: Action Toolbar ===== -->
  <div class="toolbar">
    <button class="btn btn-ghost btn-sm" onclick="backToCollectionList()">← กลับไปรายการ</button>
    ${_isBackofficeToolbar ? '<div style="margin-left:auto"></div>' : '<button class="btn btn-ghost btn-sm" style="margin-left:auto" onclick="openAddRunModal()">+ เพิ่มการรัน</button>'}
    <button class="btn btn-danger btn-sm" onclick="deleteCurrentCollection()">🗑 ลบ Collection</button>
    ${_isBackofficeToolbar ? '' : '<button class="btn btn-ghost btn-sm" onclick="renameCollection()" title="เปลี่ยนชื่อ collection">✎ แก้ไข</button>'}
    <button class="btn btn-ghost btn-sm" onclick="captureCollectionScreenshot(this)" title="Capture screenshot หน้า collection นี้ (split 900px/chunk). กดซ้ำ → ลบของเก่า แคปใหม่ทับ">📸 Screenshot</button>
    <button class="btn btn-ghost btn-sm" onclick="captureCollectionPdf(this)" title="Render หน้า collection เป็น PDF ไฟล์เดียว (สำหรับแนบ JIRA)">📄 PDF</button>
    ${_isBackofficeToolbar ? '' : '<button class="btn btn-ghost btn-sm" onclick="copyCollectionJson()" title="Copy effective results ทั้งก้อนเป็น JSON (ไว้ใช้กับเครื่องมืออื่นหรือส่งต่อ)">📦 Copy JSON</button>'}
  </div>`;

  const col = STATE.selectedCollection.collection;
  const eff = STATE.selectedCollection.effective;
  const meta = STATE.selectedCollection.meta || {};
  const runs = STATE.selectedCollection.runs || [];
  const isBackoffice = isBackofficeFormat(STATE.currentProject);

  if (isBackoffice) {
    // Backoffice header block: ชื่อ Collection ใหญ่ + ปุ่ม [✎ แก้ไข] ใต้ชื่อ
    // (🐛 JIRA Tasks ย้ายไปเป็น sub-tab — section 4)
    html += `<!-- ===== SECTION 2 (Backoffice): Title + Inline Actions ===== -->
    <div style="margin-bottom:14px;padding:14px 16px;background:#f8fafc;border:1px solid #e2e8f0;border-radius:10px">
      <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
        <div style="font-size:18px;font-weight:700;color:#1e293b">${esc(col.name)}</div>
        ${col.category ? `<span style="background:#fdf2f8;color:#be185d;padding:2px 10px;border-radius:12px;font-size:12px;font-weight:600">${esc(CATEGORY_LABELS[col.category] || col.category)}</span>` : ''}
      </div>
      ${col.description ? `<div style="color:#6b7280;font-size:12px;margin-top:4px">${esc(col.description)}</div>` : ''}
      <div style="display:flex;gap:8px;margin-top:10px;flex-wrap:wrap">
        <button class="btn btn-primary btn-sm" onclick="renameCollection()" title="แก้ไข Collection (ชื่อ / category / test cases / status)">✎ แก้ไข Collection</button>
      </div>
    </div>`;
  } else {
    // === SECTION 2: Collection info === (ชื่อ / ประเภท / คำอธิบาย / id / สร้าง / จำนวน runs)
    //   ชื่อ + คำอธิบายสามารถคลิกแก้ได้ — ส่ง PATCH ไป /api/.../collections/<id>
    //   ประเภท (crawl/walk/run/mixed) infer จาก run_ids — แสดงเป็น badge ข้างชื่อ
    const colType = inferCollectionType(col);
    const typeLabel = TYPE_LABELS[colType] || colType;
    html += `<!-- ===== SECTION 2: Collection Info ===== -->
    <div style="margin-bottom:14px">
      <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
        <div style="font-size:16px;font-weight:700">${esc(col.name)}</div>
        <span style="background:#eef2ff;color:#4338ca;padding:2px 10px;border-radius:12px;font-size:12px;font-weight:600">${esc(typeLabel)}</span>
        ${col.category ? `<span style="background:#fdf2f8;color:#be185d;padding:2px 10px;border-radius:12px;font-size:12px;font-weight:600">${esc(CATEGORY_LABELS[col.category] || col.category)}</span>` : ''}
      </div>
      <div style="display:flex;align-items:center;gap:8px;margin-top:4px">
        ${col.description
          ? `<div style="color:#6b7280;font-size:12px">${esc(col.description)}</div>`
          : `<div style="color:#9ca3af;font-size:12px;font-style:italic">(ยังไม่มีคำอธิบาย)</div>`}
      </div>
      <div style="color:#9ca3af;font-size:11px;margin-top:4px">
        ID: ${esc(col.id)} · สร้าง ${col.created_at ? new Date(col.created_at).toLocaleString('th-TH') : ''} · ${runs.length} runs
      </div>
    </div>`;

    // === SECTION 2b: Run Instructions ===
    html += renderRunInstructions(col);
  }

  // === SECTION 3: Summary cards + progress bar ===
  html += `<!-- ===== SECTION 3: Summary Cards + Progress Bar ===== -->\n`;
  if (isBackoffice) {
    // Computed async — render placeholder, fill in via setTimeout after fetching test-cases-content
    html += `<div id="bo_summary_cards"><div class="empty" style="padding:14px">กำลังคำนวณ summary จาก case_statuses + run results...</div></div>`;
    setTimeout(async () => {
      const summary = await backofficeCaseSummary(col, eff.results || []);
      STATE._boSummary = summary;
      const sc = document.getElementById('bo_summary_cards');
      if (sc) sc.outerHTML = `<div id="bo_summary_cards">${renderBackofficeSummaryCards(summary)}</div>`;
      const os = document.getElementById('bo_overall_summary');
      if (os) os.outerHTML = `<div id="bo_overall_summary">${renderBackofficeOverallSummary(summary)}</div>`;
    }, 0);
  } else {
    html += renderSummaryCards(eff.passed, eff.failed, eff.pending, eff.total, 0, eff.results);
  }

  // === SECTION 4: Sub-tabs === (🎯 Effective + 🔗 Runs + 🐛 JIRA + ▶ คำสั่งรัน)
  // - Backoffice: Effective + JIRA + คำสั่งรัน
  html += '<!-- ===== SECTION 4: Sub-tabs (Effective / Runs / JIRA / cmd) ===== -->\n';
  html += '<div class="sub-tabs">';
  html += `<button class="sub-tab ${STATE.collectionSubTab==='effective'?'active':''}" onclick="setCollectionSubTab('effective')">🎯 Effective (รวมผล)</button>`;
  if (!isBackoffice) {
    html += `<button class="sub-tab ${STATE.collectionSubTab==='runs'?'active':''}" onclick="setCollectionSubTab('runs')">🔗 Runs (${runs.length})</button>`;
  }
  const jiraCount = STATE.selectedCollectionJira && STATE.selectedCollectionJira.issues ? STATE.selectedCollectionJira.issues.length : '…';
  html += `<button class="sub-tab ${STATE.collectionSubTab==='jira'?'active':''}" onclick="setCollectionSubTab('jira')">🐛 JIRA Tasks (${jiraCount})</button>`;
  if (isBackoffice) {
    html += `<button class="sub-tab ${STATE.collectionSubTab==='cmd'?'active':''}" onclick="setCollectionSubTab('cmd')">▶ คำสั่งรัน</button>`;
  }
  html += '</div>';

  if (STATE.collectionSubTab === 'cmd' && isBackoffice) {
    // === SECTION 5: คำสั่งรัน Playwright (Backoffice only) ===
    html += '<!-- ===== SECTION 5: Run Commands (Backoffice) ===== -->\n';
    html += renderBackofficeRunCommands(col);
  } else if (STATE.collectionSubTab === 'runs' && !isBackoffice) {
    // === SECTION 5: Runs table === (Avatar only)
    html += '<!-- ===== SECTION 5: Runs Table ===== -->\n';
    html += renderCollectionRunsTable(runs);
  } else if (STATE.collectionSubTab === 'jira') {
    // === SECTION 5: JIRA Tasks table — เต็ม ===
    html += '<!-- ===== SECTION 5: JIRA Tasks ===== -->\n';
    html += renderCollectionJiraTable(STATE.selectedCollectionJira, STATE.selectedCollectionId);
  } else if (STATE.collectionSubTab === 'effective') {
    // === SECTION 5a: JIRA summary card (สรุปสั้น) ===
    // Backoffice ซ่อน — JIRA panel เปิดผ่านปุ่ม "🐛 JIRA Tasks" ที่ header (subTab='jira')
    if (!isBackoffice) {
      html += renderCollectionJiraCard(STATE.selectedCollectionJira);
    }

    if (!isBackoffice) {
      // === SECTION 6 + 7: Criteria verdict + Breakdown — grid 50/50 (Avatar only) ===
      html += '<!-- ===== SECTION 6+7: Criteria Verdict (50%) + Breakdown (50%) ===== -->\n';
      html += '<div style="display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:16px">';
      html += renderCriteriaVerdict(eff.results);
      html += renderBreakdown(eff.results);
      html += '</div>';
    }

    // === SECTION 7b: Overall summary card ===
    // - Avatar: group by owner (Dev/AI Eng/QA)
    // - Backoffice: group by module · category (login·ui, member·e2e, ...)
    html += '<!-- ===== SECTION 7b: Overall Summary (grouped) ===== -->\n';
    if (isBackoffice) {
      html += `<div id="bo_overall_summary"><div class="empty" style="padding:14px">กำลังโหลด summary by category...</div></div>`;
    } else {
      html += renderOverallSummary();
    }

    if (!isBackoffice) {
      // === SECTION 8: Return cases === (Avatar only — Infra/Latency/Content)
      html += '<!-- ===== SECTION 8: Return Cases ===== -->\n';
      html += renderReturnCases(eff.results);

      // === SECTION 9: Status filter === (Avatar only — All/PASS/FAIL/PENDING)
      html += '<!-- ===== SECTION 9: Status Filter ===== -->\n';
      html += renderFilterRow();
    }

    // === SECTION 10: Results table === (ตาราง effective — latest-wins per test_id)
    html += '<!-- ===== SECTION 10: Results Table (Effective) ===== -->\n';
    // Backoffice always uses preview-style table (TC ID / ชื่อ Test Case / Pre-condition /
    // Step # / Step / Expect Result / Status / Remark) — driven by xlsx test plan, with
    // run results overlaid onto Status. The generic renderResultsTable is for Avatar/kiosk
    // schema (graders, turns, session_id) and is NOT used for Backoffice.
    if (isBackoffice) {
      html += `<div id="bo_preview_table"><div class="empty">กำลังโหลด test cases จาก xlsx...</div></div>`;
      setTimeout(() => loadBackofficePreviewTable(col.test_case_path || '', eff.results || []), 0);
    } else {
      html += renderResultsTable(eff.results, meta, eff.per_case_run_count, {hideSession: true});
    }
  } else {
    const run = runs.find(r => r.run_id === STATE.collectionSubTab);
    if (run) {
      // === SECTION 7 (per-run tab): Breakdown ===
      html += '<!-- ===== SECTION 7: Breakdown (per-run) ===== -->\n';
      html += `<div style="margin-bottom:16px">${renderBreakdown(run.results || [])}</div>`;

      // === SECTION 9 (per-run tab): Status filter ===
      html += '<!-- ===== SECTION 9: Status Filter ===== -->\n';
      html += renderFilterRow();

      // === SECTION 10 (per-run tab): Results table ===
      html += '<!-- ===== SECTION 10: Results Table (Run) ===== -->\n';
      html += renderResultsTable(run.results || [], meta);
    } else {
      html += '<div class="empty">Run not found</div>';
    }
  }

  root.innerHTML = html;
}

// --- Collections view: navigation handlers ---

// เลือก collection — reset detail + sub-tab แล้ว sync URL
function selectCollection(cid) {
  STATE.selectedCollectionId = cid;
  STATE.selectedCollection = null;
  STATE.collectionSubTab = 'effective';
  syncUrl();
  render();
}

// Alias — ใช้ตอนกด card ใน list (อ่านง่ายกว่า)
function openCollection(cid) {
  selectCollection(cid);
}

// กลับจาก detail mode → list mode (ปุ่ม "← กลับไปรายการ")
function backToCollectionList() {
  STATE.selectedCollectionId = null;
  STATE.selectedCollection = null;
  STATE.collectionSubTab = 'effective';
  syncUrl();
  render();
}

// เปลี่ยน sub-tab ใน collection detail (Effective หรือ Run N)
function setCollectionSubTab(tab) {
  STATE.collectionSubTab = tab;
  syncUrl();
  render();
}

// --- Collections CRUD: create / delete / add runs ---

// Section divider — ใช้คั่นกลุ่มฟิลด์ใน Create/Edit modal
function sectionHeader(title) {
  return `<div style="margin-top:16px;margin-bottom:6px;padding-top:10px;border-top:1px solid #e5e7eb;font-weight:700;font-size:12px;color:#4338ca;text-transform:uppercase;letter-spacing:0.04em">${title}</div>`;
}

// เปิด modal ฟอร์มสร้าง collection ใหม่ (รับ prefill object ตอนทำซ้ำ)
function openCreateCollectionModal(prefill) {
  const pf = prefill || {};
  const today = new Date().toISOString().split('T')[0];
  const proj = STATE.currentProject;
  const presets = (proj && proj.run_cmd && proj.run_cmd.presets) || [];
  // Avatar projects: prepend "all" so users can group multi-type runs (crawl + walk + run)
  // into one collection from creation. Backoffice + chat-ai don't expose "all" — use their own types.
  const rawTypes = (proj && proj.run_cmd && proj.run_cmd.types) || ['crawl','walk','run','manual'];
  const isBackoffice = isBackofficeFormat(proj);

async function updateBackofficeCaseStatus(collectionId, caseId, newStatus) {
  try {
    const res = await api.patch(`/api/projects/${STATE.currentProject.id}/collections/${collectionId}`, {
      case_status_update: {case_id: caseId, status: newStatus},
    });
    if (res.collection && STATE.selectedCollection && STATE.selectedCollection.collection) {
      STATE.selectedCollection.collection.case_statuses = res.collection.case_statuses || {};
    }
    // Targeted DOM update — ไม่ต้อง re-render ทั้ง page (เก็บ scroll position + form focus)
    const sty = BO_STATUS_STYLE[newStatus] || BO_STATUS_STYLE.PENDING;
    const cell = document.querySelector(`td[data-bo-status-cell="${cssEscape(caseId)}"]`);
    if (cell) {
      cell.style.background = sty.bg;
      const sel = cell.querySelector('select');
      if (sel) sel.style.color = sty.color;
    }
    // Refresh Summary cards + Overall Summary (cheap async re-fetch — no full render)
    const col = STATE.selectedCollection && STATE.selectedCollection.collection;
    if (col) {
      const summary = await backofficeCaseSummary(col);
      STATE._boSummary = summary;
      const sc = document.getElementById('bo_summary_cards');
      if (sc) sc.innerHTML = renderBackofficeSummaryCards(summary);
      const os = document.getElementById('bo_overall_summary');
      if (os) os.innerHTML = renderBackofficeOverallSummary(summary);
    }
  } catch (e) {
    alert('บันทึก status ไม่สำเร็จ: ' + (e.message || e));
  }
}

// แปล error/reason จาก Playwright reporter เป็นภาษาคนสั้นๆ สำหรับใส่ใน Remark
// ตัด ANSI color codes + match pattern แล้วคืนคำอธิบายภาษาไทย/ไทยคำง่ายๆ
function humanizeFailReason(raw) {
  if (!raw) return '';
  // strip ANSI escape codes
  const s = String(raw).replace(/\x1b\[[0-9;]*m/g, '').replace(/\[\d+m/g, '').trim();

  // Pattern matching — ลำดับสำคัญ (เฉพาะเจาะจง → ทั่วไป)
  if (/Test timeout of \d+ms exceeded/i.test(s)) {
    return 'หน้าโหลดไม่ทันเวลา (timeout) — dev: เช็คว่าหน้านี้ render เสร็จภายในเวลาที่กำหนดหรือไม่';
  }
  if (/locator.*element\(s\) not found/i.test(s) || /element\(s\) not found/i.test(s)) {
    // ดึง selector ออกมาถ้ามี
    const sel = s.match(/Locator:\s*([^\n]+)/);
    return `หา element ในหน้าไม่เจอ${sel ? ' (locator: ' + sel[1].slice(0, 60) + ')' : ''} — dev: เช็คว่า element นี้แสดงในหน้าหรือไม่`;
  }
  if (/toBeVisible.*failed/i.test(s)) {
    return 'มี element แต่ไม่ visible (อาจซ่อนอยู่หรือ render ช้า) — dev: เช็ค v-if/v-show/CSS display';
  }
  if (/toHaveCount.*expected/i.test(s)) {
    const m = s.match(/expected[^"]*"(\d+)".*actual.*"(\d+)"/i) || s.match(/expected.*?(\d+).*?value\s+"(\d+)"/i);
    return m ? `จำนวน element ไม่ตรง (คาด ${m[1]} ได้ ${m[2]}) — dev: เช็คว่า render ครบทุก element หรือไม่` : 'จำนวน element ไม่ตรงที่คาด — dev: เช็คว่า render ครบหรือไม่';
  }
  if (/toHaveClass.*failed/i.test(s)) {
    return 'class ของ element ไม่ตรง — dev: เช็ค active state / conditional class';
  }
  if (/toHaveText.*failed/i.test(s) || /toHaveValue.*failed/i.test(s)) {
    return 'ข้อความหรือค่าใน element ไม่ตรง — dev: เช็ค i18n key / data binding';
  }
  if (/net::ERR_|ECONNREFUSED|ETIMEDOUT/i.test(s)) {
    return 'เชื่อมต่อ network ไม่ได้ — dev/devops: เช็ค backend service ขึ้นหรือไม่';
  }
  if (/status code (4|5)\d{2}/i.test(s)) {
    const code = s.match(/status code ((4|5)\d{2})/i);
    return `API ตอบ ${code ? code[1] : 'error'} — dev/backend: เช็ค endpoint`;
  }
  if (/page\.goto.*failed|navigation.*timeout/i.test(s)) {
    return 'เปิดหน้าไม่ได้ (navigation fail/timeout) — dev: เช็ค route + auth';
  }
  // Fallback: ตัด error message ยาวๆ ลงสั้นๆ
  const firstLine = s.split('\n').find(l => l.trim()) || s;
  return firstLine.slice(0, 200);
}

async function loadBackofficePreviewTable(testCasePaths, runResults) {
  const container = document.getElementById('bo_preview_table');
  if (!container) return;
  if (!testCasePaths) {
    container.innerHTML = '<div class="empty">ยังไม่ได้เลือก Test Case path — กด ✎ แก้ไข เพื่อเลือก test cases</div>';
    return;
  }
  try {
    const url = `/api/projects/${STATE.currentProject.id}/test-cases-content?paths=${encodeURIComponent(testCasePaths)}`;
    const data = await api.get(url);
    const rows = data.rows || [];
    if (!rows.length) {
      container.innerHTML = '<div class="empty">ไม่พบ test cases ใน xlsx ที่เลือก</div>';

    // Group rows by case_id (per case → first occurrence carries scenario/precond/testdata)
    const byId = {};
    rows.forEach(r => {
      const id = r.id || '(no-id)';

    const caseIds = Object.keys(byId);

    // ── Group cases by MODULE
